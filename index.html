                return new Promise((resolve) => {
                    gotoDelayResolve = resolve;
                    gotoDelayTimer = setTimeout(() => {
                        gotoDelayTimer = 0;
                        gotoDelayResolve = null;
                        resolve(
                            token === gotoAnimationToken &&
                                gotoAnimationActive,
                        );
                    }, delayMs);
                });
            }

            /** Persist Go To settings through the backend config endpoint. */
            async function saveGotoSettings(freqHz, targetZoom, animate, delayS) {
                const result = await apiPost("/api/goto", {
                    goto_freq_hz: freqHz,
                    goto_target_zoom: targetZoom,
                    goto_animate: animate ? 1 : 0,
                    goto_delay_s: delayS,
                });
                if (!result || result.status !== "ok") return false;
                gotoFreqHz = Number(result.goto_freq_hz);
                gotoTargetZoom = normalizeGotoTargetZoom(
                    result.goto_target_zoom,
                );
                gotoAnimate = !!result.goto_animate;
                gotoDelayS = normalizeGotoDelay(result.goto_delay_s);
                return true;
            }

            /** Move the visible viewport to the target frequency and zoom. */
            function applyGotoTargetNow(freqHz, targetZoom) {
                const target = normalizeGotoFrequency(freqHz);
                const span = gotoSpanForZoom(targetZoom);
                const next = gotoWindowForCenter(target, span);
                if (next) applyVisibleWindow(next.left, next.right, true, true);
            }

            function gotoToleranceForSpan(span) {
                return Math.max(0.001, span * 1e-6);
            }

            function gotoNeedsBackendDetailUpdate(finalStep) {
                return finalStep;
            }

            /**
             * Animate Go To locally, then retune the backend only at the final
             * target. This preserves fast visual feedback without repeated Pluto
             * reconnect/restart loops while the animation is in flight.
             */
            async function runGotoAnimation(freqHz, targetZoom) {
                cancelGotoAnimation();
                const token = ++gotoAnimationToken;
                if (viewUpdateTimer) {
                    clearTimeout(viewUpdateTimer);
                    viewUpdateTimer = null;
                }
                pendingView = null;
                viewRequestSerial++;
                supersedeQueuedViewRequest();
                const target = normalizeGotoFrequency(freqHz);
                const targetSpan = gotoSpanForZoom(targetZoom);
                let animFreq0 = currentFreq0;
                let animFreq1 = currentFreq1;
                let renderedTarget = false;
                setGotoAnimationActive(true);

                while (token === gotoAnimationToken && gotoAnimationActive) {
                    if (!hasFrequencyWindow()) break;
                    currentFreq0 = animFreq0;
                    currentFreq1 = animFreq1;
                    const currentSpan = animFreq1 - animFreq0;
                    const currentCenter = (animFreq0 + animFreq1) * 0.5;
                    const tolerance = gotoToleranceForSpan(targetSpan);
                    if (
                        Math.abs(currentSpan - targetSpan) <= tolerance &&
                        Math.abs(currentCenter - target) <= tolerance
                    ) {
                        renderedTarget = true;
                        break;
                    }
                    const nextSpan =
                        currentSpan > targetSpan
                            ? Math.max(targetSpan, currentSpan / 1.3)
                            : Math.min(targetSpan, currentSpan * 1.3);
                    const finalStep =
                        Math.abs(nextSpan - targetSpan) <= tolerance &&
                        Math.abs(currentCenter - target) <= targetSpan;
                    const nextCenter = finalStep
                        ? target
                        : currentCenter + (target - currentCenter) * 0.45;
                    const next = gotoWindowForCenter(nextCenter, nextSpan);
                    if (!next) break;
                    const beforeLine = gotoLineSerial;
                    if (
                        !applyAnimatedGotoWindow(
                            next.left,
                            next.right,
                            finalStep,
                            false,
                        )
                    )
                        break;
                    animFreq0 = currentFreq0;
                    animFreq1 = currentFreq1;
                    const updateBackend =
                        gotoNeedsBackendDetailUpdate(finalStep);
                    let rendered = false;
                    if (updateBackend) {
                        const plan = await sendImmediateViewUpdate(
                            currentFreq0,
                            currentFreq1,
                            true,
                        );
                        if (
                            token !== gotoAnimationToken ||
                            !gotoAnimationActive ||
                            !plan ||
                            plan.status !== "ok"
                        ) {
                            break;
                        }
                        rendered = await waitForGotoLine(
                            token,
                            beforeLine,
                            currentViewId,
                            currentFreq0,
                            currentFreq1,
                            plan,
                            true,
                        );
                    } else {
                        pendingViewChange = false;
                        rendered = true;
                    }
                    if (!rendered) break;
                    animFreq0 = currentFreq0;
                    animFreq1 = currentFreq1;
                    if (finalStep) renderedTarget = true;
                    if (
                        token !== gotoAnimationToken ||
                        !gotoAnimationActive ||
                        finalStep
                    ) {
                        break;
                    }
                    const keepGoing = await gotoDelay(token);
                    if (!keepGoing) break;
                }

                if (
                    token === gotoAnimationToken &&
                    gotoAnimationActive &&
                    !renderedTarget
                ) {
                    const finalWindow = gotoWindowForCenter(target, targetSpan);
                    if (finalWindow) {
                        const beforeLine = gotoLineSerial;
                        applyAnimatedGotoWindow(
                            finalWindow.left,
                            finalWindow.right,
                            true,
                            false,
                        );
                        const plan = await sendImmediateViewUpdate(
                            currentFreq0,
                            currentFreq1,
                            true,
                        );
                        if (plan && plan.status === "ok") {
                            await waitForGotoLine(
                                token,
                                beforeLine,
                                currentViewId,
                                currentFreq0,
                                currentFreq1,
                                plan,
                                true,
                            );
                        }
                    }
                }
                if (token === gotoAnimationToken && gotoAnimationActive) {
                    setGotoAnimationActive(false);
                }
            }

            function syncGotoDelayState() {
                document.getElementById("gotoDelay").disabled =
                    !document.getElementById("gotoAnimate").checked;
            }

            function closeGotoDialog() {
                document.getElementById("gotoDialog").classList.remove("open");
            }

            /** Open Go To even while idle; OK/Enter can start the stream. */
            function openGotoDialog() {
                const freq = normalizeGotoFrequency(gotoFreqHz);
                gotoFreqHz = freq;
                document.getElementById("gotoFreq").value = mhzInputValue(freq);
                document.getElementById("gotoTargetZoom").value =
                    formatZoomInputValue(gotoTargetZoom);
                document.getElementById("gotoAnimate").checked = gotoAnimate;
                document.getElementById("gotoDelay").value = String(
                    normalizeGotoDelay(gotoDelayS),
                );
                syncGotoDelayState();
                document.getElementById("gotoDialog").classList.add("open");
                document.getElementById("gotoFreq").focus();
                document.getElementById("gotoFreq").select();
            }

            /** Apply Go To. If idle, start scanning at the requested viewport. */
            async function applyGotoDialog() {
                const freqInput =
                    Number(document.getElementById("gotoFreq").value) * 1e6;
                const freqHz = normalizeGotoFrequency(freqInput);
                const targetZoom = normalizeGotoTargetZoom(
                    document.getElementById("gotoTargetZoom").value,
                );
                const animate =
                    document.getElementById("gotoAnimate").checked;
                const delayS = normalizeGotoDelay(
                    document.getElementById("gotoDelay").value,
                );
                if (
                    !(await saveGotoSettings(
                        freqHz,
                        targetZoom,
                        animate,
                        delayS,
                    ))
                )
                    return;
                closeGotoDialog();
                if (!scanRunning) {
                    applyGotoTargetNow(freqHz, targetZoom);
                    await startOrRestartScan({
                        resetView: false,
                        preserveView: true,
                    });
                    return;
                }
                if (animate) runGotoAnimation(freqHz, targetZoom);
                else applyGotoTargetNow(freqHz, targetZoom);
            }

            function tickTargetCount(width) {
                const px = width || wfCanvas.width || 800;
                return Math.max(
                    TICK_MIN_COUNT,
                    Math.min(TICK_MAX_COUNT, Math.floor(px / 95) + 1),
                );
            }

            function countTicksForStep(left, right, step) {
                if (step <= 0 || right <= left) return 0;
                const eps = step * 1e-9;
                const first = Math.ceil((left - eps) / step) * step;
                const last = Math.floor((right + eps) / step) * step;
                if (last < first) return 0;
                return Math.floor((last - first) / step) + 1;
            }

            function niceFrequencySteps(span) {
                const steps = [];
                if (span <= 0) return steps;
                const targetMin = span / Math.max(1, TICK_MAX_COUNT - 1);
                const targetMax = span / Math.max(1, TICK_MIN_COUNT - 1);
                const minPow =
                    Math.floor(Math.log10(Math.max(1e-9, targetMin))) - 1;
                const maxPow =
                    Math.ceil(Math.log10(Math.max(1, targetMax))) + 1;
                const bases = [1, 2, 5];
                for (let pow = minPow; pow <= maxPow; pow++) {
                    const scale = Math.pow(10, pow);
                    for (const base of bases) {
                        const step = base * scale;
                        if (step >= 1) steps.push(step);
                    }
                }
                return [...new Set(steps)].sort((a, b) => a - b);
            }

            function chooseFrequencyStep(left, right, width) {
                const span = right - left;
                const target = tickTargetCount(width);
                const desired = span / Math.max(1, target - 1);
                let best = null;
                for (const step of niceFrequencySteps(span)) {
                    const count = countTicksForStep(left, right, step);
                    if (count < TICK_MIN_COUNT || count > TICK_MAX_COUNT) {
                        continue;
                    }
                    const score =
                        Math.abs(count - target) * 10 +
                        Math.abs(Math.log10(step / desired));
                    if (
                        !best ||
                        score < best.score ||
                        (Math.abs(score - best.score) < 1e-9 &&
                            count > best.count)
                    ) {
                        best = { step, count, score };
                    }
                }
                if (best) return best.step;

                return (
                    niceFrequencySteps(span).find((step) => step >= desired) ||
                    desired
                );
            }

            function decimalsForFrequencyStep(stepHz) {
                const stepMHz = stepHz / 1e6;
                for (let decimals = 0; decimals <= 5; decimals++) {
                    const scaled = stepMHz * Math.pow(10, decimals);
                    if (Math.abs(scaled - Math.round(scaled)) < 1e-6)
                        return decimals;
                }
                return 5;
            }

            function formatTickMHz(freq, stepHz) {
                const decimals = decimalsForFrequencyStep(stepHz);
                return (freq / 1e6).toFixed(decimals) + " MHz";
            }

            function parseBandsIni(text) {
                const parsed = [];
                let current = null;

                function flushBand() {
                    if (
                        current &&
                        current.name &&
                        Number.isFinite(current.start_hz) &&
                        Number.isFinite(current.end_hz) &&
                        current.end_hz > current.start_hz
                    ) {
                        parsed.push(current);
                    }
                }

                for (const rawLine of text.split(/\r?\n/)) {
                    const line = rawLine.replace(/[;#].*$/, "").trim();
                    if (!line) continue;
                    const section = line.match(/^\[(.+)\]$/);
                    if (section) {
                        flushBand();
                        current = { name: section[1].trim() };
                        continue;
                    }
                    const eq = line.indexOf("=");
                    if (eq < 0) continue;
                    if (!current) current = {};
                    const key = line.slice(0, eq).trim().toLowerCase();
                    const value = line.slice(eq + 1).trim();
                    if (key === "name") current.name = value;
                    else if (key === "start_mhz")
                        current.start_hz = Number(value) * 1e6;
                    else if (key === "end_mhz")
                        current.end_hz = Number(value) * 1e6;
                    else if (key === "start_hz")
                        current.start_hz = Number(value);
                    else if (key === "end_hz") current.end_hz = Number(value);
                }
                flushBand();
                return parsed.sort((a, b) => a.start_hz - b.start_hz);
            }

            async function loadBands() {
                try {
                    const resp = await fetch("/bands.ini", {
                        cache: "no-store",
                    });
                    if (!resp.ok) return;
                    bands = parseBandsIni(await resp.text());
                    if (currentBins && currentBins.length) {
                        drawScope(
                            currentBins,
                            currentSourceStart(),
                            currentSourceEnd(),
                            currentSteps,
                        );
                    }
                } catch (e) {
                    bands = [];
                }
            }

            function drawBandIndicators(axis, width, height) {
                if (!bands.length || !axis || axis.right <= axis.left) return;
                const colors = [
                    "rgba(0, 148, 255, 0.28)",
                    "rgba(255, 104, 56, 0.26)",
                    "rgba(78, 216, 112, 0.25)",
                    "rgba(221, 76, 255, 0.24)",
                    "rgba(255, 205, 54, 0.24)",
                ];
                const headerColors = [
                    "rgba(0, 148, 255, 0.42)",
                    "rgba(255, 104, 56, 0.40)",
                    "rgba(78, 216, 112, 0.36)",
                    "rgba(221, 76, 255, 0.36)",
                    "rgba(255, 205, 54, 0.36)",
                ];
                const labelColors = [
                    "#a9dcff",
                    "#ffc2aa",
                    "#bff2c9",
                    "#ebb3ff",
                    "#ffe49a",
                ];
                const span = axis.right - axis.left;
                const visibleBands = [];

                bands.forEach((band, idx) => {
                    const left = Math.max(axis.left, band.start_hz);
                    const right = Math.min(axis.right, band.end_hz);
                    if (right <= left) return;

                    const x0 = ((left - axis.left) / span) * width;
                    const x1 = ((right - axis.left) / span) * width;
                    const w = Math.max(1, x1 - x0);
                    const colorIdx = idx % colors.length;

                    scCtx.fillStyle = colors[colorIdx];
                    scCtx.fillRect(x0, 0, w, height);
                    visibleBands.push({ band, x0, x1, w, colorIdx });
                });

                if (!visibleBands.length) return;

                scCtx.font = "10px monospace";
                scCtx.textAlign = "center";
                scCtx.textBaseline = "top";
                const rows = [];
                const maxRows = 4;
                visibleBands.forEach((entry) => {
                    if (entry.w < 24) return;
                    const labelWidth = Math.min(
                        entry.w,
                        scCtx.measureText(entry.band.name).width + 8,
                    );
                    const idealLeft = entry.x0 + (entry.w - labelWidth) * 0.5;
                    const labelLeft = Math.max(
                        entry.x0,
                        Math.min(entry.x1 - labelWidth, idealLeft),
                    );
                    const labelRight = labelLeft + labelWidth;
                    let row = rows.findIndex((right) => labelLeft > right + 4);
                    if (row < 0 && rows.length < maxRows) {
                        row = rows.length;
                        rows.push(-Infinity);
                    }
                    if (row < 0) return;
                    rows[row] = labelRight;

                    const y = 2 + row * 12;
                    const colorIdx = entry.colorIdx;
                    scCtx.save();
                    scCtx.beginPath();
                    scCtx.rect(entry.x0, y, entry.w, 12);
                    scCtx.clip();
                    scCtx.fillStyle = headerColors[colorIdx];
                    scCtx.fillRect(entry.x0, y, entry.w, 12);
                    scCtx.fillStyle = labelColors[colorIdx];
                    scCtx.fillText(
                        entry.band.name,
                        entry.x0 + entry.w * 0.5,
                        y + 1,
                    );
                    scCtx.restore();
                });
            }

            function bandsAtFrequency(freq) {
                return bands
                    .filter(
                        (band) => freq >= band.start_hz && freq <= band.end_hz,
                    )
                    .map((band) => band.name);
            }

            function normalizeMarker(marker, index) {
                const group = marker.group || "Ungrouped";
                return {
                    id: marker.id !== undefined ? marker.id : index,
                    name: marker.name || "",
                    group,
                    frequency_hz: Number(marker.frequency_hz),
                };
            }

            function updateMarkerCount() {
                const el = document.getElementById("infoMarkers");
                if (el) el.textContent = String(markers.length);
            }

            async function loadMarkers() {
                const data = await apiGet("/api/markers");
                if (!data || data.status !== "ok") {
                    markers = [];
                    markerGroups = ["Ungrouped"];
                    updateMarkerCount();
                    return;
                }
                markers = (data.markers || [])
                    .map(normalizeMarker)
                    .filter(
                        (marker) =>
                            marker.name &&
                            Number.isFinite(marker.frequency_hz) &&
                            marker.frequency_hz >= 0,
                    );
                markerGroups = [
                    ...new Set(["Ungrouped", ...(data.groups || [])]),
                ];
                for (const marker of markers) {
                    if (!markerGroups.includes(marker.group))
                        markerGroups.push(marker.group);
                }
                updateMarkerCount();
                if (currentBins && currentBins.length) {
                    drawScope(
                        currentBins,
                        currentSourceStart(),
                        currentSourceEnd(),
                        currentSteps,
                    );
                }
            }

            function cleanIniValue(value) {
                return String(value || "")
                    .replace(/[\r\n]/g, " ")
                    .trim();
            }

            function serializeMarkersIni() {
                const lines = [
                    "# Human-editable frequency markers",
                    "# Each marker section supports name, group, frequency_hz or frequency_mhz.",
                    "",
                ];
                markers
                    .slice()
                    .sort((a, b) => a.frequency_hz - b.frequency_hz)
                    .forEach((marker, idx) => {
                        lines.push("[marker_" + (idx + 1) + "]");
                        lines.push("name = " + cleanIniValue(marker.name));
                        lines.push(
                            "group = " +
                                cleanIniValue(marker.group || "Ungrouped"),
                        );
                        lines.push(
                            "frequency_hz = " +
                                Math.round(Number(marker.frequency_hz) || 0),
                        );
                        lines.push("");
                    });
                return lines.join("\n");
            }

            async function saveMarkers() {
                const controller = new AbortController();
                const timer = setTimeout(() => controller.abort(), 5000);
                try {
                    const resp = await fetch("/api/markers/save", {
                        method: "POST",
                        headers: {
                            "Content-Type": "text/plain; charset=utf-8",
                        },
                        body: serializeMarkersIni(),
                        signal: controller.signal,
                    });
                    if (!resp.ok) return false;
                    const data = await resp.json();
                    return data && data.status === "ok";
                } catch (e) {
                    return false;
                } finally {
                    clearTimeout(timer);
                }
            }

            function drawMarkers(axis, width, height) {
                markerHitBoxes = [];
                if (!markers.length || !axis || axis.right <= axis.left) return;
                const span = axis.right - axis.left;
                scCtx.save();
                scCtx.font = "10px monospace";
                scCtx.textBaseline = "top";
                for (const marker of markers) {
                    const freq = Number(marker.frequency_hz);
                    if (freq < axis.left || freq > axis.right) continue;
                    const x = ((freq - axis.left) / span) * width;
                    markerHitBoxes.push({ marker, x });

                    scCtx.strokeStyle = "rgba(255, 230, 120, 0.85)";
                    scCtx.lineWidth = 1;
                    scCtx.beginPath();
                    scCtx.moveTo(x, 0);
                    scCtx.lineTo(x, height);
                    scCtx.stroke();

                    scCtx.fillStyle = "#ffd76b";
                    scCtx.beginPath();
                    scCtx.moveTo(x + 1, 4);
                    scCtx.lineTo(x + 12, 8);
                    scCtx.lineTo(x + 1, 12);
                    scCtx.closePath();
                    scCtx.fill();
                    scCtx.fillRect(x, 3, 1, 16);
                }
                scCtx.restore();
            }

            function nearestMarkerAtCanvas(canvas, clientX) {
                if (!hasFrequencyWindow()) return null;
                const freq = frequencyAt(canvas, clientX);
                if (freq === null) return null;
                const rect = canvas.getBoundingClientRect();
                const axis = getZoomedFrequencyAxis(
                    currentFreq0,
                    currentFreq1,
                    currentSteps,
                    currentBins ? currentBins.length : 0,
                );
                const toleranceHz =
                    ((axis.right - axis.left) / Math.max(1, rect.width)) * 8;
                let best = null;
                let bestDistance = Infinity;

                if (canvas === scCanvas && markerHitBoxes.length) {
                    const x = clientX - rect.left;
                    for (const hit of markerHitBoxes) {
                        const distancePx = Math.abs(hit.x - x);
                        if (distancePx <= 10 && distancePx < bestDistance) {
                            best = hit.marker;
                            bestDistance = distancePx;
                        }
                    }
                    if (best) return best;
                    bestDistance = Infinity;
                }

                for (const marker of markers) {
                    const distance = Math.abs(marker.frequency_hz - freq);
                    if (distance <= toleranceHz && distance < bestDistance) {
                        best = marker;
                        bestDistance = distance;
                    }
                }
                return best;
            }

            function fillMarkerGroups(selected) {
                const select = document.getElementById("markerGroup");
                const values = [...new Set(["Ungrouped", ...markerGroups])];
                select.replaceChildren(
                    ...values.map((group) => {
                        const option = document.createElement("option");
                        option.value = group;
                        option.textContent = group;
                        return option;
                    }),
                );
                select.value = values.includes(selected)
                    ? selected
                    : "Ungrouped";
            }

            function closeMarkerDialog() {
                markerDialogTarget = null;
                document
                    .getElementById("markerDialog")
                    .classList.remove("open");
            }

            function openMarkerDialog(marker, freq, clientX, clientY) {
                const dialog = document.getElementById("markerDialog");
                markerDialogTarget = marker || null;
                fillMarkerGroups(marker ? marker.group : "Ungrouped");
                document.getElementById("markerName").value = marker
                    ? marker.name
                    : "";
                document.getElementById("markerFreq").value = formatMHzValue(
                    marker ? marker.frequency_hz : freq,
                    6,
                );
                document.getElementById("markerDelete").disabled = !marker;
                dialog.classList.add("open");
                const left = Math.min(window.innerWidth - 280, clientX + 8);
                const top = Math.min(window.innerHeight - 190, clientY + 8);
                dialog.style.left = Math.max(8, left) + "px";
                dialog.style.top = Math.max(8, top) + "px";
                document.getElementById("markerName").focus();
            }

            async function applyMarkerDialog() {
                const name = cleanIniValue(
                    document.getElementById("markerName").value,
                );
                const group =
                    cleanIniValue(
                        document.getElementById("markerGroup").value,
                    ) || "Ungrouped";
                const freqHz =
                    Number(document.getElementById("markerFreq").value) * 1e6;
                if (!name || !Number.isFinite(freqHz) || freqHz < 0) return;
                if (!markerGroups.includes(group)) markerGroups.push(group);
                if (markerDialogTarget) {
                    markerDialogTarget.name = name;
                    markerDialogTarget.group = group;
                    markerDialogTarget.frequency_hz = freqHz;
                } else {
                    markers.push({
                        id: Date.now(),
                        name,
                        group,
                        frequency_hz: freqHz,
                    });
                }
                updateMarkerCount();
                closeMarkerDialog();
                await saveMarkers();
                if (currentBins && currentBins.length)
                    drawScope(
                        currentBins,
                        currentSourceStart(),
                        currentSourceEnd(),
                        currentSteps,
                    );
            }

            async function deleteMarkerDialog() {
                if (!markerDialogTarget) return;
                markers = markers.filter(
                    (marker) => marker !== markerDialogTarget,
                );
                updateMarkerCount();
                closeMarkerDialog();
                await saveMarkers();
                if (currentBins && currentBins.length)
                    drawScope(
                        currentBins,
                        currentSourceStart(),
                        currentSourceEnd(),
                        currentSteps,
                    );
            }

            function stopMarkerMouseEvent(evt) {
                evt.preventDefault();
                evt.stopPropagation();
                if (typeof evt.stopImmediatePropagation === "function")
                    evt.stopImmediatePropagation();
            }

            function openMarkerDialogFromEvent(canvas, evt) {
                stopMarkerMouseEvent(evt);
                const freq = frequencyAt(canvas, evt.clientX);
                if (freq === null) return false;
                const marker = nearestMarkerAtCanvas(canvas, evt.clientX);
                openMarkerDialog(marker, freq, evt.clientX, evt.clientY);
                return true;
            }

            function handleMarkerMouseDown(canvas, evt) {
                const shiftLeftClick = evt.shiftKey && evt.button === 0;
                const modifiedRightClick =
                    evt.button === 2 &&
                    !evt.shiftKey &&
                    (evt.ctrlKey || evt.altKey || evt.metaKey);
                if (!shiftLeftClick && !modifiedRightClick) return;
                if (openMarkerDialogFromEvent(canvas, evt))
                    markerContextSuppressUntil = Date.now() + 1000;
            }

            function handleMarkerContextMenu(canvas, evt) {
                if (Date.now() < markerContextSuppressUntil) {
                    stopMarkerMouseEvent(evt);
                    return;
                }
                if (
                    evt.shiftKey ||
                    evt.button !== 2 ||
                    !(evt.ctrlKey || evt.altKey || evt.metaKey)
                ) {
                    return;
                }
                openMarkerDialogFromEvent(canvas, evt);
            }

            function handleMarkerAuxClick(canvas, evt) {
                if (evt.button !== 2) return;
                if (evt.shiftKey || Date.now() < markerContextSuppressUntil)
                    stopMarkerMouseEvent(evt);
            }

            function subdivisionCountForStep(step) {
                if (step <= 0) return 0;
                const pow = Math.pow(10, Math.floor(Math.log10(step)));
                const lead = step / pow;
                return Math.abs(lead - 5) < 1e-9 ? 5 : 10;
            }

            function tickKey(freq) {
                return Math.round(freq * 1000);
            }

            function buildFrequencyMarks(left, right, width) {
                if (right <= left) return [];
                const step = chooseFrequencyStep(left, right, width);
                const marks = [];
                const seen = new Set();
                const eps = step * 1e-9;
                let freq = Math.ceil((left - eps) / step) * step;
                const end = Math.floor((right + eps) / step) * step;
                while (freq <= end + eps && marks.length < TICK_MAX_COUNT) {
                    const pos = ((freq - left) / (right - left)) * 100;
                    marks.push({
                        pos: Math.max(0, Math.min(100, pos)),
                        freq,
                        step,
                        kind: "major",
                    });
                    seen.add(tickKey(freq));
                    freq += step;
                }

                const subdivisions = subdivisionCountForStep(step);
                const minorStep = step / subdivisions;
                for (
                    let major = Math.ceil((left - step - eps) / step) * step;
                    major <= right + step + eps;
                    major += step
                ) {
                    for (let i = 1; i < subdivisions; i++) {
                        const minorFreq = major + minorStep * i;
                        if (minorFreq <= left + eps || minorFreq >= right - eps)
                            continue;
                        const key = tickKey(minorFreq);
                        if (seen.has(key)) continue;
                        seen.add(key);
                        marks.push({
                            pos: ((minorFreq - left) / (right - left)) * 100,
                            freq: minorFreq,
                            step,
                            kind:
                                subdivisions === 10 && i === 5
                                    ? "mid"
                                    : "minor",
                        });
                    }
                }

                return marks.sort((a, b) => {
                    if (a.pos !== b.pos) return a.pos - b.pos;
                    if (a.kind === b.kind) return 0;
                    return a.kind === "major" ? -1 : 1;
                });
            }

            function updateZoomIndicator() {
                const fullSpan = configuredFreq1 - configuredFreq0;
                const viewSpan =
                    (currentFreq1 - currentFreq0) *
                    Math.max(1 / MAX_ZOOM_FACTOR, zoomRight - zoomLeft);
                let zoom = 1;
                if (fullSpan > 0 && viewSpan > 0)
                    zoom = Math.max(1, fullSpan / viewSpan);
                if (Math.abs(zoom - 1) <= 1e-6) zoom = 1;
                if (Math.abs(zoom - MAX_ZOOM_FACTOR) <= MAX_ZOOM_FACTOR * 1e-3)
                    zoom = MAX_ZOOM_FACTOR;
                document.getElementById("infoZoom").textContent =
                    zoom < 10 ? zoom.toFixed(2) + "x" : zoom.toFixed(1) + "x";
            }

            /**
             * Render frequency tick labels when the visible axis changes.
             *
             * @param {number} freqStart Visible start frequency in hertz.
             * @param {number} freqEnd Visible end frequency in hertz.
             * @param {number} steps Backend hop count for the current row/view.
             * @returns {void}
             */
            function updateFrequencyLabels(freqStart, freqEnd, steps) {
                const overlay = document.getElementById("freqScale");
                const axis = getZoomedFrequencyAxis(
                    freqStart,
                    freqEnd,
                    steps,
                    currentBins ? currentBins.length : 0,
                );
                const width = overlay.clientWidth || wfCanvas.width;
                const signature = [
                    axis.left,
                    axis.right,
                    steps,
                    currentBins ? currentBins.length : 0,
                    width,
                ].join(":");
                if (signature === freqScaleSignature) {
                    updateZoomIndicator();
                    return;
                }
                freqScaleSignature = signature;
                const ticks = buildFrequencyMarks(
                    axis.left,
                    axis.right,
                    width,
                );

                overlay.replaceChildren(
                    ...ticks.map((tick) => {
                        const mark = document.createElement("div");
                        const label = document.createElement("div");
                        mark.className =
                            "wf-tick" +
                            (tick.kind === "major" ? "" : " " + tick.kind);
                        if (tick.pos < 2) mark.classList.add("edge-start");
                        if (tick.pos > 98) mark.classList.add("edge-end");
                        mark.style.left = tick.pos + "%";
                        if (tick.kind === "major") {
                            label.className = "wf-tick-label";
                            label.textContent = formatTickMHz(
                                tick.freq,
                                tick.step,
                            );
                            mark.appendChild(label);
                        }
                        return mark;
                    }),
                );
                updateZoomIndicator();
            }

            function frequencyAt(canvas, clientX) {
                const rect = canvas.getBoundingClientRect();
                const x = Math.max(
                    0,
                    Math.min(rect.width, clientX - rect.left),
                );
                const axis = getZoomedFrequencyAxis(
                    currentFreq0,
                    currentFreq1,
                    currentSteps,
                    currentBins ? currentBins.length : 0,
                );
                if (axis.right <= axis.left || rect.width <= 0) return null;
                return axis.left + (x / rect.width) * (axis.right - axis.left);
            }

            function receiverFrequencyFromRadio(freq) {
                if (currentConverterFreq >= 0) {
                    return freq - currentConverterFreq;
                }
                return Math.abs(-currentConverterFreq - freq);
            }

            function percentileFromSorted(values, percentile) {
                if (!values.length) return 0;
                const idx = Math.max(
                    0,
                    Math.min(
                        values.length - 1,
                        Math.floor((values.length - 1) * percentile),
                    ),
                );
                return values[idx];
            }

            /**
             * Update automatic waterfall level limits from robust percentiles.
             *
             * @param {number[]} data Packed waterfall values from one SSE row.
             * @returns {void}
             */
            function updateAutoWaterfallLevels(data) {
                if (!waterfallAuto || !data || !data.length) return;
                const sampleStep = Math.max(1, Math.floor(data.length / 2048));
                const samples = [];
                for (let i = 0; i < data.length; i += sampleStep)
                    samples.push(data[i] | 0);
                samples.sort((a, b) => a - b);
                const low = percentileFromSorted(samples, 0.08);
                const high = percentileFromSorted(samples, 0.985);
                const targetMin = Math.max(0, Math.min(398, low - 8));
                const autoMaxBase = Math.max(targetMin + 2, high + 18);
                const targetMax = Math.max(
                    targetMin + 2,
                    Math.min(400, Math.round(autoMaxBase * 1.2)),
                );

                if (autoWfMin === null || autoWfMax === null) {
                    autoWfMin = targetMin;
                    autoWfMax = targetMax;
                } else {
                    autoWfMin += (targetMin - autoWfMin) * 0.04;
                    autoWfMax += (targetMax - autoWfMax) * 0.06;
                }

                const nextMin = Math.round(autoWfMin);
                const nextMax = Math.max(nextMin + 1, Math.round(autoWfMax));
                if (nextMin === waterfallMin && nextMax === waterfallMax)
                    return;
                waterfallMin = nextMin;
                waterfallMax = nextMax;
                document.getElementById("wfMin").value = String(nextMin);
                document.getElementById("wfMax").value = String(nextMax);
                updateWaterfallLevelDisplay();
                localStorage.setItem("wfMin", String(nextMin));
                localStorage.setItem("wfMax", String(nextMax));
            }

            function mapWaterfallValue(value) {
                const span = Math.max(1, waterfallMax - waterfallMin);
                const scaled = ((value - waterfallMin) * 255) / span;
                return Math.max(0, Math.min(255, Math.round(scaled)));
            }

            function mapSpectrumValue(value) {
                const span = Math.max(1, waterfallMax - waterfallMin);
                const scaled = (Number(value) - waterfallMin) / span;
                return Math.max(0, Math.min(1, scaled));
            }

            function writeWaterfallPixel(pix, offset, rawValue) {
                const val = mapWaterfallValue(rawValue | 0);
                pix[offset] = colorLUT[val * 3];
                pix[offset + 1] = colorLUT[val * 3 + 1];
                pix[offset + 2] = colorLUT[val * 3 + 2];
                pix[offset + 3] = 255;
            }

            /**
             * Fill a waterfall pixel buffer with opaque black pixels.
             *
             * @param {Uint8ClampedArray} pix RGBA pixel buffer.
             * @returns {void}
             */
            function clearWaterfallPixelBuffer(pix) {
                for (let i = 0; i < pix.length; i += 4) {
                    pix[i] = 0;
                    pix[i + 1] = 0;
                    pix[i + 2] = 0;
                    pix[i + 3] = 255;
                }
            }

            function clearWaterfallPixels() {
                if (!wfImageData) return;
                clearWaterfallPixelBuffer(wfImageData.data);
            }

            /**
             * Borrow an inactive ImageData buffer for waterfall full-frame work.
             *
             * @param {number} width Canvas width in pixels.
             * @param {number} height Canvas height in pixels.
             * @returns {ImageData} Writable image buffer with matching dimensions.
             */
            function takeWaterfallScratchImageData(width, height) {
                if (
                    wfScratchImageData &&
                    wfScratchImageData.width === width &&
                    wfScratchImageData.height === height
                ) {
                    const imageData = wfScratchImageData;
                    wfScratchImageData = null;
                    return imageData;
                }
                return wfCtx.createImageData(width, height);
            }

            /**
             * Retain an inactive ImageData buffer for later waterfall redraw work.
             *
             * @param {ImageData|null} imageData Inactive image buffer.
             * @param {number} width Expected canvas width in pixels.
             * @param {number} height Expected canvas height in pixels.
             * @returns {void}
             */
            function retainWaterfallScratchImageData(imageData, width, height) {
                if (!imageData || imageData === wfImageData) return;
                if (imageData.width === width && imageData.height === height) {
                    wfScratchImageData = imageData;
                } else {
                    wfScratchImageData = null;
                }
            }

            /**
             * Transform the existing waterfall image into a new frequency window.
             *
             * @param {number} prevStart Previous visible start frequency in hertz.
             * @param {number} prevEnd Previous visible end frequency in hertz.
             * @param {number} nextStart Next visible start frequency in hertz.
             * @param {number} nextEnd Next visible end frequency in hertz.
             * @param {Uint8ClampedArray|null} sourcePixels Optional source RGBA pixels.
             * @returns {void}
             */
            function transformWaterfallPixels(
                prevStart,
                prevEnd,
                nextStart,
                nextEnd,
                sourcePixels = null,
            ) {
                if (!wfImageData) return;
                const previousImageData = wfImageData;
                const w = previousImageData.width;
                const h = previousImageData.height;
                const prevSpan = prevEnd - prevStart;
                const nextSpan = nextEnd - nextStart;
                if (w <= 0 || h <= 0 || prevSpan <= 0 || nextSpan <= 0) return;

                const source =
                    sourcePixels &&
                    sourcePixels.length === previousImageData.data.length
                        ? sourcePixels
                        : previousImageData.data;
                const imageData = takeWaterfallScratchImageData(w, h);
                const dest = imageData.data;

                for (let y = 0; y < h; y++) {
                    const rowOffset = y * w * 4;
                    for (let x = 0; x < w; x++) {
                        const freq = nextStart + ((x + 0.5) / w) * nextSpan;
                        const srcX = Math.floor(
                            ((freq - prevStart) / prevSpan) * w,
                        );
                        const dst = rowOffset + x * 4;
                        if (srcX >= 0 && srcX < w) {
                            const src = rowOffset + srcX * 4;
                            dest[dst] = source[src];
                            dest[dst + 1] = source[src + 1];
                            dest[dst + 2] = source[src + 2];
                            dest[dst + 3] = 255;
                        } else {
                            dest[dst] = 0;
                            dest[dst + 1] = 0;
                            dest[dst + 2] = 0;
                            dest[dst + 3] = 255;
                        }
                    }
                }

                wfImageData = imageData;
                retainWaterfallScratchImageData(previousImageData, w, h);
                wfCtx.putImageData(wfImageData, 0, 0);
            }

            function transformVisibleDisplay(
                prevStart,
                prevEnd,
                nextStart,
                nextEnd,
                sourcePixels = null,
            ) {
                transformWaterfallPixels(
                    prevStart,
                    prevEnd,
                    nextStart,
                    nextEnd,
                    sourcePixels,
                );
                if (currentBins && currentBins.length) {
                    drawScope(
                        currentBins,
                        currentSourceStart(prevStart),
                        currentSourceEnd(prevEnd),
                        currentSteps,
                    );
                }
            }

            /**
             * Redraw retained waterfall history for the current visible window.
             *
             * @param {number} renderToken Redraw generation token.
             * @returns {void}
             */
            function redrawWaterfallHistory(renderToken) {
                if (!wfImageData) {
                    resolveCurrentViewRedrawWaiters();
                    return;
                }

                const w = wfImageData.width;
                const h = wfImageData.height;
                const imageData = takeWaterfallScratchImageData(w, h);
                const pix = imageData.data;
                const rows = Math.min(wfRows.length, h);
                let y = 0;
                let cachedRanges = null;
                let cachedBinCount = 0;

                clearWaterfallPixelBuffer(pix);
                waterfallRenderActiveToken = renderToken;

                function finishRender() {
                    if (waterfallRenderActiveToken === renderToken) {
                        waterfallRenderActiveToken = 0;
                    }
                    if (renderToken === waterfallRenderToken)
                        resolveCurrentViewRedrawWaiters();
                }

                function drawChunk() {
                    if (renderToken !== waterfallRenderToken || !wfImageData) {
                        retainWaterfallScratchImageData(imageData, w, h);
                        finishRender();
                        return;
                    }

                    const stop = Math.min(rows, y + WF_REDRAW_ROWS_PER_FRAME);
                    for (; y < stop; y++) {
                        const row = wfRows[wfRows.length - 1 - y];
                        const rowData = row.data || row;
                        const n = rowData.length;
                        if (!n) continue;
                        const rowHasWindow = hasFrequencyWindow(row.f0, row.f1);
                        if (!rowHasWindow) continue;
                        const sourceStart = row.f0;
                        const sourceEnd = row.f1;
                        const targetAxis = getZoomedFrequencyAxis(
                            currentFreq0,
                            currentFreq1,
                            currentSteps,
                            n,
                        );
                        const sameAxis = sameFrequencySpan(
                            targetAxis.left,
                            targetAxis.right,
                            sourceStart,
                            sourceEnd,
                        );
                        if (
                            sameAxis &&
                            n !== w &&
                            (!cachedRanges || cachedBinCount !== n)
                        ) {
                            cachedBinCount = n;
                            cachedRanges = getCanvasBinRanges(
                                w,
                                n,
                                clampZoomRange(n),
                            );
                        }
                        const rowOffset = y * w * 4;
                        for (let x = 0; x < w; x++) {
                            const value =
                                sameAxis && n === w
                                    ? rowData[x]
                                    : sameAxis
                                      ? dataPeakForBinRange(
                                            rowData,
                                            cachedRanges.first[x],
                                            cachedRanges.last[x],
                                        )
                                      : dataPeakForAxis(
                                            rowData,
                                            x,
                                            w,
                                            targetAxis,
                                            sourceStart,
                                            sourceEnd,
                                        );
                            writeWaterfallPixel(pix, rowOffset + x * 4, value);
                        }
                    }

                    if (y < rows) {
                        requestAnimationFrame(drawChunk);
                        return;
                    }

                    if (
                        renderToken === waterfallRenderToken &&
                        wfImageData &&
                        wfImageData.width === w &&
                        wfImageData.height === h
                    ) {
                        const previousImageData = wfImageData;
                        wfImageData = imageData;
                        wfCtx.putImageData(wfImageData, 0, 0);
                        retainWaterfallScratchImageData(previousImageData, w, h);
                    } else {
                        retainWaterfallScratchImageData(imageData, w, h);
                    }
                    finishRender();
                }

                drawChunk();
            }

            /**
             * Draw one packed waterfall row and retain it for future redraws.
             *
             * @param {Uint8Array|number[]} data Packed row values, one per bin.
             * @param {number} freqStart Row start frequency in hertz.
             * @param {number} freqEnd Row end frequency in hertz.
             * @param {number} steps Backend hop count for this row.
             * @returns {void}
             */
            function drawWaterfallLine(data, freqStart, freqEnd, steps) {
                if (!wfImageData) return;
                const wasRendering = waterfallRenderActiveToken !== 0;
                waterfallRenderToken++;
                updateAutoWaterfallLevels(data);

                const pix = wfImageData.data;
                const w = wfImageData.width;

                wfRows.push({ data, f0: freqStart, f1: freqEnd });
                trimWaterfallHistory(data.length);

                // Scroll down by 1 pixel; newest scan line is written at the top.
                pix.copyWithin(4 * w, 0, 4 * w * (wfImageData.height - 1));

                const topRow = 0;

                // Map data bins to canvas pixels
                const n = data.length;
                const targetAxis = getZoomedFrequencyAxis(
                    currentFreq0,
                    currentFreq1,
                    steps,
                    n,
                );
                const sameAxis = sameFrequencySpan(
                    targetAxis.left,
                    targetAxis.right,
                    freqStart,
                    freqEnd,
                );
                const range = sameAxis ? clampZoomRange(n) : null;
                const binRanges =
                    sameAxis && n !== w
                        ? getCanvasBinRanges(w, n, range)
                        : null;
                for (let x = 0; x < w; x++) {
                    const bi = topRow + x * 4;
                    const value =
                        sameAxis && n === w
                            ? data[x]
                            : sameAxis
                              ? dataPeakForBinRange(
                                    data,
                                    binRanges.first[x],
                                    binRanges.last[x],
                                )
                              : dataPeakForAxis(
                                    data,
                                    x,
                                    w,
                                    targetAxis,
                                    freqStart,
                                    freqEnd,
                                );
                    writeWaterfallPixel(pix, bi, value);
                }

                wfCtx.putImageData(wfImageData, 0, 0);

                // Update frequency labels
                updateFrequencyLabels(currentFreq0, currentFreq1, steps);
                if (wasRendering) scheduleCurrentViewRedraw();
            }

            // ===================================================================
            //  Draw spectrum scope (most recent line)
            // ===================================================================
            function drawScope(data, freqStart, freqEnd, steps) {
                const w = scCanvas.width;
                const h = scCanvas.height;
                scCtx.fillStyle = "#000";
                scCtx.fillRect(0, 0, w, h);

                const n = data.length;
                if (n < 2) return;

                const targetAxis = getZoomedFrequencyAxis(
                    currentFreq0,
                    currentFreq1,
                    steps,
                    n,
                );
                drawBandIndicators(targetAxis, w, h);

                // Grid lines
                scCtx.strokeStyle = "#1a2030";
                scCtx.lineWidth = 1;
                for (let i = 0; i < 5; i++) {
                    const y = h * 0.2 * i;
                    scCtx.beginPath();
                    scCtx.moveTo(0, y);
                    scCtx.lineTo(w, y);
                    scCtx.stroke();
                }

                // Draw the spectrum with the same min/max level window as the waterfall.
                scCtx.strokeStyle = "#40c0a0";
                scCtx.lineWidth = 1.5;
                scCtx.beginPath();
                const sameAxis = sameFrequencySpan(
                    targetAxis.left,
                    targetAxis.right,
                    freqStart,
                    freqEnd,
                );
                const range = sameAxis ? clampZoomRange(n) : null;
                const binRanges =
                    sameAxis && n !== w
                        ? getCanvasBinRanges(w, n, range)
                        : null;
                for (let x = 0; x < w; x++) {
                    const rawValue =
                        sameAxis && n === w
                            ? data[x]
                            : sameAxis
                              ? dataPeakForBinRange(
                                    data,
                                    binRanges.first[x],
                                    binRanges.last[x],
                                )
                              : dataPeakForAxis(
                                    data,
                                    x,
                                    w,
                                    targetAxis,
                                    freqStart,
                                    freqEnd,
                                );
                    const v = mapSpectrumValue(rawValue);
                    const y = h - 5 - v * (h - 10);
                    if (x === 0) scCtx.moveTo(x, y);
                    else scCtx.lineTo(x, y);
                }
                scCtx.stroke();
                drawMarkers(targetAxis, w, h);

                // Peak dot
                let maxVal = 0,
                    maxX = 0;
                const sourceStart = Math.max(freqStart, targetAxis.left);
                const sourceEnd = Math.min(freqEnd, targetAxis.right);
                if (sourceEnd <= sourceStart) return;
                const sourceSpan = Math.max(1, freqEnd - freqStart);
                const firstBin = Math.max(
                    0,
                    Math.min(
                        n - 1,
                        Math.floor(
                            ((sourceStart - freqStart) / sourceSpan) * n,
                        ),
                    ),
                );
                const lastBin = Math.min(
                    n,
                    Math.max(
                        firstBin + 1,
                        Math.ceil(((sourceEnd - freqStart) / sourceSpan) * n),
                    ),
                );
                for (let i = firstBin; i < lastBin; i++) {
                    if (data[i] > maxVal) {
                        maxVal = data[i];
                        maxX = i;
                    }
                }
                const maxFreq = freqStart + ((maxX + 0.5) / n) * sourceSpan;
                const px =
                    ((maxFreq - targetAxis.left) /
                        Math.max(1, targetAxis.right - targetAxis.left)) *
                    w;
                const py = h - 5 - mapSpectrumValue(maxVal) * (h - 10);
                scCtx.fillStyle = "#ff8040";
                scCtx.beginPath();
                scCtx.arc(px, py, 3, 0, 2 * Math.PI);
                scCtx.fill();
            }

            // ===================================================================
            //  SSE connection
            // ===================================================================
            let eventSource = null;

            function parseLineEventPayload(raw) {
                let data;
                try {
                    data = JSON.parse(raw);
                } catch (e) {
                    return null;
                }
                if (!data || !Array.isArray(data.d)) return null;
                const expectedBins = Number(data.display_bins || data.d.length);
                if (
                    !Number.isInteger(expectedBins) ||
                    expectedBins <= 0 ||
                    data.d.length !== expectedBins
                ) {
                    return null;
                }
                if (expectedBins !== displayBins()) {
                    scheduleViewUpdate(currentFreq0, currentFreq1, false);
                    return null;
                }
                for (let i = 0; i < data.d.length; i++) {
                    const v = Number(data.d[i]);
                    if (!Number.isInteger(v) || v < 0 || v > 255) return null;
                    data.d[i] = v;
                }
                if (
                    data.f0 !== undefined &&
                    data.f1 !== undefined &&
                    (!Number.isFinite(Number(data.f0)) ||
                        !Number.isFinite(Number(data.f1)) ||
                        Number(data.f1) <= Number(data.f0))
                ) {
                    return null;
                }
                return data;
            }

            function scheduleSSEReconnect() {
                if (!backendOnline || !scanRunning) return;
                if (sseReconnectTimer) clearTimeout(sseReconnectTimer);
                const delay = Math.min(
                    5000,
                    500 * Math.max(1, ++sseFailureCount),
                );
                sseReconnectTimer = setTimeout(() => {
                    sseReconnectTimer = 0;
                    if (backendOnline && scanRunning && !eventSource)
                        connectSSE();
                }, delay);
            }

            function connectSSE() {
                if (eventSource) eventSource.close();
                sseOpenMs = performance.now();
                lastSseLineMs = 0;
                eventSource = new EventSource("/api/waterfall");

                eventSource.addEventListener("line", function (e) {
                    const data = parseLineEventPayload(e.data);
                    if (!data) return;
                    try {
                        const bins = Uint8Array.from(data.d);
                        const rowView =
                            data.view !== undefined
                                ? Number(data.view)
                                : currentViewId;
                        const rowFreq0 =
                            data.f0 !== undefined
                                ? Number(data.f0)
                                : currentFreq0;
                        const rowFreq1 =
                            data.f1 !== undefined
                                ? Number(data.f1)
                                : currentFreq1;
                        if (pendingViewChange && rowView === currentViewId)
                            return;
                        if (
                            currentViewId &&
                            rowView &&
                            rowView !== currentViewId
                        ) {
                            if (rowView < currentViewId) return;
                            currentViewId = rowView;
                        }
                        if (!currentViewId && rowView) currentViewId = rowView;
                        if (data.full_f0 !== undefined)
                            configuredFreq0 = Number(data.full_f0);
                        if (data.full_f1 !== undefined)
                            configuredFreq1 = Number(data.full_f1);
                        if (!gotoAnimationActive && data.f0 !== undefined)
                            currentFreq0 = rowFreq0;
                        if (!gotoAnimationActive && data.f1 !== undefined)
                            currentFreq1 = rowFreq1;
                        if (data.b) currentSteps = data.b;
                        updateFFTInfo(data);
                        if (
                            (!gotoAnimationActive && !gotoPreviewRetained) ||
                            pendingViewChange
                        ) {
                            zoomLeft = 0;
                            zoomRight = 1;
                        }
                        if (pendingViewChange) gotoPreviewRetained = false;
                        pendingViewChange = false;
                        currentBins = bins;
                        currentBinsFreq0 = rowFreq0;
                        currentBinsFreq1 = rowFreq1;
                        recordWaterfallLineArrival();

                        drawWaterfallLine(
                            bins,
                            rowFreq0,
                            rowFreq1,
                            currentSteps,
                        );
                        drawScope(
                            bins,
                            rowFreq0,
                            rowFreq1,
                            currentSteps,
                        );
                        notifyGotoLineDrawn(
                            data,
                            rowView,
                            rowFreq0,
                            rowFreq1,
                        );

                        document.getElementById("infoRange").textContent =
                            formatScanRange(currentFreq0, currentFreq1);
                        saveVisibleView();
                    } catch (e) {
                        console.warn("Ignored invalid waterfall line", e);
                    }
                });

                eventSource.onopen = function () {
                    sseFailureCount = 0;
                };

                eventSource.onerror = async function () {
                    if (eventSource) {
                        eventSource.close();
                        eventSource = null;
                    }
                    const status = await checkBackendStatus();
                    if (status || (backendOnline && scanRunning))
                        scheduleSSEReconnect();
                };
            }

            function disconnectSSE() {
                if (sseReconnectTimer) {
                    clearTimeout(sseReconnectTimer);
                    sseReconnectTimer = 0;
                }
                if (eventSource) {
                    eventSource.close();
                    eventSource = null;
                }
                sseOpenMs = 0;
                lastSseLineMs = 0;
            }

            function ensureSSEReceiving() {
                if (!backendOnline || !scanRunning) return;
                if (!eventSource) {
                    connectSSE();
                    return;
                }
                if (
                    eventSource.readyState === EventSource.CLOSED ||
                    eventSource.readyState === 2
                ) {
                    disconnectSSE();
                    connectSSE();
                    return;
                }

                const referenceMs = lastSseLineMs || sseOpenMs;
                if (
                    referenceMs > 0 &&
                    performance.now() - referenceMs > sseStallTimeoutMs()
                ) {
                    disconnectSSE();
                    connectSSE();
                }
            }

            function clearAutoRestartTimer() {
                if (autoRestartTimer) {
                    clearTimeout(autoRestartTimer);
                    autoRestartTimer = 0;
                }
            }

            function statusDevicePresent(status) {
                if (!status || status.device_present === undefined) return true;
                return !!Number(status.device_present);
            }

            function scheduleDesiredScanRestart(status) {
                if (!desiredScanRunning || autoRestartInFlight)
                    return;
                if (
                    !backendOnline ||
                    scanRunning ||
                    !statusDevicePresent(status)
                )
                    return;

                clearAutoRestartTimer();
                autoRestartTimer = setTimeout(async () => {
                    autoRestartTimer = 0;
                    if (
                        !desiredScanRunning ||
                        autoRestartInFlight ||
                        scanRunning ||
                        !backendOnline
                    ) {
                        return;
                    }
                    autoRestartInFlight = true;
                    try {
                        await startOrRestartScan({
                            resetView: false,
                            preserveView: true,
                            autoRetry: true,
                        });
                    } finally {
                        autoRestartInFlight = false;
                    }
                }, AUTO_RESTART_DELAY_MS);
            }

            async function checkBackendStatus() {
                if (statusPollInFlight) return null;
                statusPollInFlight = true;
                let status = null;
                try {
                    status = await apiGet("/api/status");
                } finally {
                    statusPollInFlight = false;
                }

                if (!status) {
                    clearAutoRestartTimer();
                    updateUI(false, false);
                    disconnectSSE();
                    return null;
                }

                const reconnecting =
                    !Number(status.scanning) &&
                    !!Number(status.auto_restart_on_reconnect || 0);
                updateUI(!!status.scanning, true, reconnecting);
                if (status.sw_version !== undefined)
                    document.getElementById("infoSw").textContent =
                        status.sw_version || "---";
                if (status.hardware !== undefined)
                    document.getElementById("infoHw").textContent =
                        status.hardware || "---";
                if (status.serial !== undefined)
                    document.getElementById("infoSn").textContent =
                        status.serial || "---";
                if (!gotoAnimationActive && status.view_id !== undefined)
                    currentViewId = Number(status.view_id);
                if (status.configured_start_hz !== undefined)
                    configuredFreq0 = Number(status.configured_start_hz);
                if (status.configured_end_hz !== undefined)
                    configuredFreq1 = Number(status.configured_end_hz);
                const keepLocalView =
                    gotoAnimationActive ||
                    gotoPreviewRetained ||
                    pendingViewChange;
                if (!keepLocalView && status.visible_start_hz !== undefined)
                    currentFreq0 = Number(status.visible_start_hz);
                if (!keepLocalView && status.visible_end_hz !== undefined)
                    currentFreq1 = Number(status.visible_end_hz);
                if (status.samplerate !== undefined)
                    configuredSampleRate = Number(status.samplerate);
                if (status.bw_ratio !== undefined)
                    configuredBwRatio = Number(status.bw_ratio);
                syncPlutoControls(status, { updateRateControls: !!status.scanning });
                if (status.direct_sampling !== undefined)
                    configuredDirectSampling = Number(status.direct_sampling);
                if (status.goto_freq_hz !== undefined)
                    gotoFreqHz = Number(status.goto_freq_hz);
                if (status.goto_target_zoom !== undefined)
                    gotoTargetZoom = normalizeGotoTargetZoom(
                        status.goto_target_zoom,
                    );
                if (status.goto_animate !== undefined)
                    gotoAnimate = !!Number(status.goto_animate);
                if (status.goto_delay_s !== undefined)
                    gotoDelayS = normalizeGotoDelay(status.goto_delay_s);
                updateFFTInfo(status);
                if (status.scanning) {
                    clearAutoRestartTimer();
                    if (Number(status.display_bins) !== displayBins())
                        scheduleViewUpdate(currentFreq0, currentFreq1, false);
                    ensureSSEReceiving();
                } else {
                    disconnectSSE();
                    scheduleDesiredScanRestart(status);
                }
                return status;
            }

            // ===================================================================
            //  Hover readout
            // ===================================================================
            const hoverReadout = document.getElementById("hoverReadout");

            function showHoverReadout(canvas, evt, includeLevel) {
                if (rulerActive) return;
                if (panActive) {
                    hoverReadout.style.display = "none";
                    return;
                }
                if (!hasFrequencyWindow()) {
                    hoverReadout.style.display = "none";
                    return;
                }

                const freq = frequencyAt(canvas, evt.clientX);
                if (freq === null) {
                    hoverReadout.style.display = "none";
                    return;
                }

                const axis = getZoomedFrequencyAxis(
                    currentFreq0,
                    currentFreq1,
                    currentSteps,
                    currentBins ? currentBins.length : 0,
                );
                const decimals = decimalsForSpan(axis.right - axis.left);
                const lines = [];
                const marker = nearestMarkerAtCanvas(canvas, evt.clientX);
                if (marker)
                    lines.push(
                        marker.name +
                            " (" +
                            (marker.group || "Ungrouped") +
                            ")",
                    );
                const bandNames = bandsAtFrequency(freq);
                if (bandNames.length) lines.push(bandNames.join(", "));
                if (currentConverterFreq !== 0) {
                    lines.push("RF: " + formatMHz(freq, decimals));
                    lines.push(
                        "RX: " +
                            formatMHz(
                                receiverFrequencyFromRadio(freq),
                                decimals,
                            ),
                    );
                } else {
                    lines.push(formatMHz(freq, decimals));
                }
                if (includeLevel) {
                    const rect = canvas.getBoundingClientRect();
                    const y = Math.max(
                        0,
                        Math.min(rect.height, evt.clientY - rect.top),
                    );
                    const level = scopeDbAboveBottomAtCanvasY(y);
                    if (level !== null) {
                        const decimals = level < 10 ? 2 : level < 100 ? 1 : 0;
                        lines.push(
                            "Level: " +
                                formatCompactNumber(level, decimals) +
                                " dB",
                        );
                    }
                }

                hoverReadout.textContent = lines.join("\n");
                hoverReadout.style.left = evt.clientX + 12 + "px";
                hoverReadout.style.top = evt.clientY + 12 + "px";
                hoverReadout.style.display = "block";
            }

            function hideHoverReadout() {
                hoverReadout.style.display = "none";
            }

            function updateRulerModeCursor() {
                document.body.classList.toggle("ruler-mode", rulerActive);
            }

            function waterfallPointFromEvent(evt) {
                const rect = wfCanvas.getBoundingClientRect();
                if (rect.width <= 0 || rect.height <= 0) return null;
                return {
                    x: clampNumber(
                        ((evt.clientX - rect.left) / rect.width) *
                            wfCanvas.width,
                        0,
                        wfCanvas.width,
                    ),
                    y: clampNumber(
                        ((evt.clientY - rect.top) / rect.height) *
                            wfCanvas.height,
                        0,
                        wfCanvas.height,
                    ),
                };
            }

            function scopePointFromEvent(evt) {
                const rect = scCanvas.getBoundingClientRect();
                if (rect.width <= 0 || rect.height <= 0) return null;
                return {
                    x: clampNumber(
                        ((evt.clientX - rect.left) / rect.width) * scCanvas.width,
                        0,
                        scCanvas.width,
                    ),
                    y: clampNumber(
                        ((evt.clientY - rect.top) / rect.height) *
