            // ===================================================================
            //  API calls
            // ===================================================================
            async function apiFetchJson(url, options = {}) {
                const fetchOptions = { ...options };
                const timeoutMs = Number(fetchOptions.timeoutMs || 5000);
                delete fetchOptions.timeoutMs;
                const controller = new AbortController();
                const timer = setTimeout(() => controller.abort(), timeoutMs);
                try {
                    const resp = await fetch(url, {
                        ...fetchOptions,
                        signal: controller.signal,
                    });
                    if (!resp.ok) {
                        let payload = null;
                        let text = "";
                        try {
                            text = await resp.text();
                            payload = text ? JSON.parse(text) : null;
                        } catch (e) {
                            payload = null;
                        }
                        return {
                            ...(payload || {}),
                            status: "error",
                            http_status: resp.status,
                            message:
                                (payload && payload.message) ||
                                text ||
                                resp.statusText ||
                                "HTTP error",
                        };
                    }
                    return await resp.json();
                } catch (e) {
                    return null;
                } finally {
                    clearTimeout(timer);
                }
            }

            async function apiPost(url, body, options = {}) {
                return apiFetchJson(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body),
                    ...options,
                });
            }

            async function apiGet(url) {
                return apiFetchJson(url);
            }

            function applyViewPlan(plan, clearOnViewChange) {
                if (!plan) return false;

                const nextView =
                    plan.view_id !== undefined
                        ? Number(plan.view_id)
                        : currentViewId;
                if (
                    Number.isFinite(nextView) &&
                    nextView > 0 &&
                    currentViewId > 0 &&
                    nextView < currentViewId
                ) {
                    return false;
                }
                const viewChanged = nextView && nextView !== currentViewId;
                if (nextView) currentViewId = nextView;

                if (plan.configured_start_hz !== undefined)
                    configuredFreq0 = Number(plan.configured_start_hz);
                else if (plan.freq_start !== undefined)
                    configuredFreq0 = Number(plan.freq_start);
                if (plan.configured_end_hz !== undefined)
                    configuredFreq1 = Number(plan.configured_end_hz);
                else if (plan.freq_end !== undefined)
                    configuredFreq1 = Number(plan.freq_end);

                if (plan.visible_start_hz !== undefined)
                    currentFreq0 = Number(plan.visible_start_hz);
                else if (plan.freq_start !== undefined)
                    currentFreq0 = Number(plan.freq_start);
                if (plan.visible_end_hz !== undefined)
                    currentFreq1 = Number(plan.visible_end_hz);
                else if (plan.freq_end !== undefined)
                    currentFreq1 = Number(plan.freq_end);

                if (plan.steps !== undefined) {
                    currentSteps = Number(plan.steps);
                }
                if (plan.samplerate !== undefined)
                    configuredSampleRate = Number(plan.samplerate);
                if (plan.bw_ratio !== undefined)
                    configuredBwRatio = Number(plan.bw_ratio);
                syncPlutoControls(plan);
                if (plan.rate_limit_lps !== undefined) {
                    setRateLimitValue(plan.rate_limit_lps);
                }
                if (plan.min_rate_lps !== undefined) {
                    setMinRateValue(plan.min_rate_lps);
                }
                if (plan.first_line_ms !== undefined) {
                    const firstLineMs = Number(plan.first_line_ms);
                    if (Number.isFinite(firstLineMs) && firstLineMs >= 0)
                        currentFirstLineMs = firstLineMs;
                }
                if (plan.clk_source !== undefined) {
                    setClockSourceValue(plan.clk_source);
                }
                if (plan.direct_sampling_max_hz !== undefined) {
                    currentDirectSamplingMaxHz = Number(
                        plan.direct_sampling_max_hz,
                    );
                }
                if (plan.direct_sampling !== undefined) {
                    configuredDirectSampling = Number(plan.direct_sampling);
                    document.getElementById("directSampling").value = String(
                        plan.direct_sampling,
                    );
                    syncDirectSamplingFields(plan.direct_sampling !== 0);
                }
                updateFFTInfo(plan);

                zoomLeft = 0;
                zoomRight = 1;
                pendingViewChange = false;
                if (clearOnViewChange && viewChanged)
                    scheduleCurrentViewRedraw();
                if (hasFrequencyWindow() && currentSteps) {
                    updateFrequencyLabels(
                        currentFreq0,
                        currentFreq1,
                        currentSteps,
                    );
                    document.getElementById("infoRange").textContent =
                        formatScanRange(currentFreq0, currentFreq1);
                    saveVisibleView();
                }
                return true;
            }

            function scheduleViewUpdate(
                visibleStart,
                visibleEnd,
                visibleChanged,
                immediate = false,
            ) {
                if (!backendOnline || !scanRunning) return;
                if (gotoAnimationActive) return;
                if (!hasFrequencyWindow(visibleStart, visibleEnd)) return;

                pendingView = {
                    visible_start_hz: visibleStart,
                    visible_end_hz: visibleEnd,
                    display_bins: displayBins(),
                    visible_changed: !!visibleChanged,
                };
                if (viewUpdateTimer) clearTimeout(viewUpdateTimer);
                if (immediate) {
                    sendViewUpdate();
                } else {
                    viewUpdateTimer = setTimeout(
                        sendViewUpdate,
                        VIEW_RETUNE_IDLE_DELAY_MS,
                    );
                }
            }

            /** Resolve and remove a queued view request superseded by newer input. */
            function supersedeQueuedViewRequest() {
                if (!queuedViewRequest) return;
                const request = queuedViewRequest;
                queuedViewRequest = null;
                request.resolve(null);
            }

            /** Send one queued view request at a time and apply only the newest response. */
            async function pumpViewRequestQueue() {
                if (viewRequestInFlight || !queuedViewRequest) return;
                const request = queuedViewRequest;
                queuedViewRequest = null;
                viewRequestInFlight = true;

                const result = await apiPost(
                    "/api/view",
                    {
                        visible_start_hz: request.visibleStart,
                        visible_end_hz: request.visibleEnd,
                        display_bins: displayBins(),
                        view_id: currentViewId,
                    },
                    { timeoutMs: 10000 },
                );
                const isNewest = request.serial === viewRequestSerial;
                let applied = false;

                if (isNewest && result && result.status === "ok") {
                    applied = applyViewPlan(result, request.visibleChanged);
                    updateUI(!!result.scanning, true);
                    if (result.scanning && !eventSource) connectSSE();
                } else if (isNewest && !result) {
                    pendingViewChange = false;
                    const status = await apiGet("/api/status");
                    if (status) {
                        applyViewPlan(status, false);
                        updateUI(!!status.scanning, true);
                    } else {
                        updateUI(false, false);
                        disconnectSSE();
                    }
                } else if (isNewest && result && result.status !== "ok") {
                    pendingViewChange = false;
                    updateUI(false, true);
                }

                request.resolve(applied ? result : null);
                viewRequestInFlight = false;
                if (queuedViewRequest) pumpViewRequestQueue();
            }

            function sendImmediateViewUpdate(
                visibleStart,
                visibleEnd,
                visibleChanged,
            ) {
                if (!backendOnline || !scanRunning) return Promise.resolve(null);
                if (!hasFrequencyWindow(visibleStart, visibleEnd))
                    return Promise.resolve(null);
                if (viewUpdateTimer) {
                    clearTimeout(viewUpdateTimer);
                    viewUpdateTimer = null;
                }
                pendingView = null;
                const serial = ++viewRequestSerial;
                supersedeQueuedViewRequest();
                return new Promise((resolve) => {
                    queuedViewRequest = {
                        serial,
                        visibleStart,
                        visibleEnd,
                        visibleChanged: !!visibleChanged,
                        resolve,
                    };
                    pumpViewRequestQueue();
                });
            }

            async function sendViewUpdate() {
                const request = pendingView;
                if (!request) return;
                pendingView = null;
                viewUpdateTimer = null;

                await sendImmediateViewUpdate(
                    request.visible_start_hz,
                    request.visible_end_hz,
                    request.visible_changed,
                );
            }

            /**
             * Format a sample-rate or RF-bandwidth value for read-only controls.
             *
             * @param {number} rate Frequency-like value in hertz.
             * @returns {string} Human-readable Hz/kHz/MHz label.
             */
            function sampleRateLabel(rate) {
                const value = Number(rate);
                if (!Number.isFinite(value) || value <= 0) return "---";
                if (value >= 1e6) {
                    const mhz = value / 1e6;
                    const text = Number.isInteger(mhz)
                        ? mhz.toFixed(0)
                        : mhz.toFixed(3).replace(/0+$/, "").replace(/\.$/, "");
                    return text + " MHz";
                }
                if (value >= 1e3)
                    return (value / 1e3).toFixed(3).replace(/0+$/, "").replace(/\.$/, "") + " kHz";
                return value.toFixed(0) + " Hz";
            }

            function ensureSelectOption(select, value, label) {
                if (!select || !Number.isFinite(Number(value))) return;
                const textValue = String(Math.round(Number(value)));
                for (const opt of select.options) {
                    if (String(Math.round(Number(opt.value))) === textValue) {
                        opt.textContent = label;
                        select.value = opt.value;
                        return;
                    }
                }
                const opt = document.createElement("option");
                opt.value = textValue;
                opt.textContent = label;
                select.appendChild(opt);
                select.value = textValue;
            }

            function syncSampleRateOptions(rates, selected) {
                const sel = document.getElementById("samplerate");
                const fallback = [
                    4000000, 8000000, 16000000, 20000000, 30720000, 40000000,
                    61440000,
                ];
                const list = Array.isArray(rates) && rates.length ? rates : fallback;
                const chosen = Number(selected) || configuredSampleRate;
                const merged = list.some((rate) => Math.abs(Number(rate) - chosen) < 1)
                    ? list
                    : [...list, chosen];
                const opts = merged.map((rate) => {
                    const opt = document.createElement("option");
                    opt.value = String(rate);
                    opt.textContent = sampleRateLabel(rate);
                    if (Math.abs(rate - chosen) < 1) opt.selected = true;
                    return opt;
                });
                sel.replaceChildren(...opts);
                sel.value = String(chosen);
            }

            function setRateLimitValue(value) {
                const idx = clampNumber(
                    nearestRateIndex(value || 20),
                    RATE_LIMIT_MIN_INDEX,
                    RATE_LIMIT_MAX_INDEX,
                );
                document.getElementById("rateLimit").value = String(
                    RATE_VALUES[idx],
                );
                updateRateRangeDisplay();
            }

            /**
             * Reflect the backend's active Pluto RF profile in disabled controls.
             *
             * @param {Object} plan Backend status/start/view payload.
             * @param {Object} [options] Optional UI sync flags.
             * @param {boolean} [options.updateRateControls=true] Whether to
             * rebuild read-only sample-rate/RF-bandwidth/passband options.
             * @returns {void}
             */
            function syncPlutoControls(plan, options = {}) {
                if (!plan) return;
                const updateRateControls = options.updateRateControls !== false;
                const shownSampleRate =
                    plan.active_samplerate !== undefined
                        ? Number(plan.active_samplerate)
                        : plan.samplerate !== undefined
                          ? Number(plan.samplerate)
                          : NaN;
                const shownRfBandwidth =
                    plan.active_rf_bandwidth !== undefined
                        ? Number(plan.active_rf_bandwidth)
                        : plan.rf_bandwidth !== undefined
                          ? Number(plan.rf_bandwidth)
                          : NaN;
                const shownBwRatio =
                    plan.active_bw_ratio !== undefined
                        ? Number(plan.active_bw_ratio)
                        : plan.bw_ratio !== undefined
                          ? Number(plan.bw_ratio)
                          : NaN;
                if (Number.isFinite(shownSampleRate)) {
                    configuredSampleRate = shownSampleRate;
                    const srSel = document.getElementById("samplerate");
                    if (srSel && updateRateControls)
                        ensureSelectOption(
                            srSel,
                            configuredSampleRate,
                            sampleRateLabel(configuredSampleRate),
                        );
                }
                if (Number.isFinite(shownRfBandwidth)) {
                    configuredRfBandwidth = shownRfBandwidth;
                    const bwSel = document.getElementById("rfBandwidth");
                    if (bwSel && updateRateControls)
                        ensureSelectOption(
                            bwSel,
                            configuredRfBandwidth,
                            sampleRateLabel(configuredRfBandwidth),
                        );
                }
                if (Number.isFinite(shownBwRatio)) {
                    configuredBwRatio = shownBwRatio;
                    const ratioSel = document.getElementById("bwRatio");
                    if (ratioSel && updateRateControls)
                        ensureSelectOption(
                            ratioSel,
                            configuredBwRatio,
                            configuredBwRatio.toFixed(3).replace(/0+$/, "").replace(/\.$/, ""),
                        );
                }
                if (plan.gain_mode !== undefined) {
                    const gainMode = document.getElementById("gainMode");
                    if (gainMode) gainMode.value = String(plan.gain_mode);
                }
                if (plan.hardwaregain_db !== undefined) {
                    const gain = Number(plan.hardwaregain_db);
                    const gainEl = document.getElementById("vgaGain");
                    if (gainEl) gainEl.value = String(Math.round(gain));
                    const val = document.getElementById("vgaVal");
                    if (val) val.textContent = String(Math.round(gain));
                }
            }

            function setMinRateValue(value) {
                const idx = clampNumber(
                    nearestRateIndex(value || 0),
                    RATE_MIN_MIN_INDEX,
                    RATE_MIN_MAX_INDEX,
                );
                document.getElementById("minRate").value = String(
                    RATE_VALUES[idx],
                );
                updateRateRangeDisplay();
            }

            function setClockSourceValue(value) {
                document.getElementById("clockIn").checked =
                    Number(value) !== 0;
            }

            function updateScanInfo(plan) {
                const el = document.getElementById("infoScan");
                if (!el || !plan) return;
                const mode = plan.mode || plan.active_mode || "single";
                const steps =
                    plan.steps !== undefined
                        ? Number(plan.steps)
                        : plan.b !== undefined
                          ? Number(plan.b)
                          : 0;
                el.textContent =
                    mode === "scan" && steps >= 2 ? steps + " steps" : "Fixed";
            }

            function updateTrafficInfo(plan) {
                const el = document.getElementById("infoTraffic");
                if (!el || !plan || plan.traffic_kbytes_s === undefined) return;
                const value = Number(plan.traffic_kbytes_s);
                if (!Number.isFinite(value)) return;
                el.textContent =
                    value < 100
                        ? value.toFixed(1) + " kB/s"
                        : Math.round(value) + " kB/s";
            }

            function updateFFTInfo(plan) {
                if (!plan) return;
                updateWaterfallLineRateEstimate(plan);
                const fftInfo = document.getElementById("infoFFT");
                if (!fftInfo) return;
                const fft =
                    plan.effective_fft_size !== undefined
                        ? Number(plan.effective_fft_size)
                        : plan.fft_size !== undefined
                          ? Number(plan.fft_size)
                          : 0;
                const decim =
                    plan.decim_factor !== undefined
                        ? Number(plan.decim_factor)
                        : 1;
                if (!fft) return;
                fftInfo.textContent =
                    decim > 1 ? fft + " x" + decim : String(fft);
                updateScanInfo(plan);
                updateTrafficInfo(plan);
            }

            // ===================================================================
            //  UI
            // ===================================================================
            /**
             * Update scan controls and backend heartbeat state.
             *
             * @param {boolean} running Whether the backend is actively scanning.
             * @param {boolean} connected Whether the HTTP backend is reachable.
             * @param {boolean} reconnecting Whether backend is waiting to resume after reconnect.
             * @returns {void}
             */
            function updateUI(running, connected = true, reconnecting = false) {
                backendOnline = connected;
                scanRunning = connected && running;
                syncFirstRowControlState();
                const dot = document.getElementById("statusDot");
                if (!connected) {
                    dot.className = "status-dot disconnected";
                    document.getElementById("statusText").textContent =
                        "disconnected";
                } else if (reconnecting) {
                    dot.className = "status-dot reconnecting";
                    document.getElementById("statusText").textContent =
                        "reconnecting...";
                } else {
                    dot.className =
                        "status-dot " + (running ? "running" : "idle");
                    document.getElementById("statusText").textContent = running
                        ? "scanning"
                        : "idle";
                }
            }

            function mhzInputValue(freq) {
                const value = Number(freq);
                if (!Number.isFinite(value)) return "";
                return (value / 1e6)
                    .toFixed(6)
                    .replace(/0+$/, "")
                    .replace(/\.$/, "");
            }

            function applyScanPlan(plan) {
                if (!plan) return;

                zoomLeft = 0;
                zoomRight = 1;

                if (plan.configured_start_hz !== undefined)
                    configuredFreq0 = Number(plan.configured_start_hz);
                else if (plan.freq_start !== undefined)
                    configuredFreq0 = Number(plan.freq_start);
                if (plan.configured_end_hz !== undefined)
                    configuredFreq1 = Number(plan.configured_end_hz);
                else if (plan.freq_end !== undefined)
                    configuredFreq1 = Number(plan.freq_end);

                if (Number.isFinite(configuredFreq0)) {
                    document.getElementById("freqStart").value =
                        mhzInputValue(configuredFreq0);
                }
                if (Number.isFinite(configuredFreq1)) {
                    document.getElementById("freqEnd").value =
                        mhzInputValue(configuredFreq1);
                }

                if (plan.visible_start_hz !== undefined)
                    currentFreq0 = Number(plan.visible_start_hz);
                else if (plan.freq_start !== undefined)
                    currentFreq0 = Number(plan.freq_start);
                if (plan.visible_end_hz !== undefined)
                    currentFreq1 = Number(plan.visible_end_hz);
                else if (plan.freq_end !== undefined)
                    currentFreq1 = Number(plan.freq_end);

                if (plan.view_id !== undefined)
                    currentViewId = Number(plan.view_id);
                if (plan.steps !== undefined) {
                    currentSteps = plan.steps;
                }
                if (plan.samplerate !== undefined)
                    configuredSampleRate = Number(plan.samplerate);
                if (plan.bw_ratio !== undefined)
                    configuredBwRatio = Number(plan.bw_ratio);
                syncPlutoControls(plan);
                if (plan.converter_freq !== undefined) {
                    currentConverterFreq = plan.converter_freq;
                    document.getElementById("converterFreq").value =
                        mhzInputValue(plan.converter_freq);
                }
                if (plan.rate_limit_lps !== undefined) {
                    setRateLimitValue(plan.rate_limit_lps);
                }
                if (plan.min_rate_lps !== undefined) {
                    setMinRateValue(plan.min_rate_lps);
                }
                if (plan.clk_source !== undefined) {
                    setClockSourceValue(plan.clk_source);
                }
                if (plan.direct_sampling_max_hz !== undefined) {
                    currentDirectSamplingMaxHz = Number(
                        plan.direct_sampling_max_hz,
                    );
                }
                if (plan.direct_sampling !== undefined) {
                    configuredDirectSampling = Number(plan.direct_sampling);
                    document.getElementById("directSampling").value = String(
                        plan.direct_sampling,
                    );
                    syncDirectSamplingFields(plan.direct_sampling !== 0);
                }
                updateFFTInfo(plan);
                if (hasFrequencyWindow()) {
                    updateFrequencyLabels(
                        currentFreq0,
                        currentFreq1,
                        currentSteps,
                    );
                    document.getElementById("infoRange").textContent =
                        formatScanRange(currentFreq0, currentFreq1);
                    saveVisibleView();
                }
            }

            function buildScanRequest(options = {}) {
                sanitizeScanFrequencyInputs();
                const request = {
                    freq_start: parseFloat(
                        document.getElementById("freqStart").value,
                    ),
                    freq_end: parseFloat(document.getElementById("freqEnd").value),
                    converter_freq: parseFloat(
                        document.getElementById("converterFreq").value,
                    ),
                    samplerate: parseFloat(
                        document.getElementById("samplerate").value,
                    ),
                    rf_bandwidth: parseFloat(
                        document.getElementById("rfBandwidth").value,
                    ),
                    bw_ratio: parseFloat(document.getElementById("bwRatio").value),
                    gain_mode: document.getElementById("gainMode").value,
                    hardwaregain_db: parseFloat(
                        document.getElementById("vgaGain").value,
                    ),
                    min_rate_lps: parseInt(
                        document.getElementById("minRate").value,
                    ),
                    rate_limit_lps: parseInt(
                        document.getElementById("rateLimit").value,
                    ),
                    display_bins: displayBins(),
                };
                if (options.preserveView && hasFrequencyWindow()) {
                    request.visible_start_hz = currentFreq0;
                    request.visible_end_hz = currentFreq1;
                }
                return request;
            }

            function scanControlsMatchAppliedSettings() {
                const samplerate = parseFloat(
                    document.getElementById("samplerate").value,
                );
                const rfBandwidth = parseFloat(
                    document.getElementById("rfBandwidth").value,
                );
                const bwRatio = parseFloat(document.getElementById("bwRatio").value);
                const startHz = inputMhzToHz("freqStart");
                const endHz = inputMhzToHz("freqEnd");
                const converterHz = inputMhzToHz("converterFreq");

                if (!sameStoredNumber(samplerate, configuredSampleRate, 1))
                    return false;
                if (!sameStoredNumber(rfBandwidth, configuredRfBandwidth, 1))
                    return false;
                if (!sameStoredNumber(bwRatio, configuredBwRatio, 1e-9))
                    return false;
                if (!sameStoredFrequency(startHz, configuredFreq0))
                    return false;
                if (!sameStoredFrequency(endHz, configuredFreq1))
                    return false;
                if (!sameStoredFrequency(converterHz, currentConverterFreq))
                    return false;
                return hasFrequencyWindow(currentFreq0, currentFreq1);
            }

            function clearScanDisplay() {
                cancelCurrentViewRedraw();
                freqScaleSignature = "";
                currentBins = null;
                currentBinsFreq0 = 0;
                currentBinsFreq1 = 0;
                wfRows = [];
                clearWaterfallPixels();
                if (wfImageData) wfCtx.putImageData(wfImageData, 0, 0);
            }

            async function startOrRestartScan(options = { resetView: true }) {
                options = Object.assign({ resetView: true }, options || {});
                if (
                    options.resetView !== false &&
                    scanControlsMatchAppliedSettings()
                ) {
                    options.resetView = false;
                    options.preserveView = true;
                }
                desiredScanRunning = true;
                clearAutoRestartTimer();
                const serial = ++scanRequestSerial;
                viewRequestSerial++;
                supersedeQueuedViewRequest();
                pendingView = null;
                pendingViewChange = false;
                if (viewUpdateTimer) {
                    clearTimeout(viewUpdateTimer);
                    viewUpdateTimer = null;
                }
                if (options.resetView !== false) {
                    clearSavedView();
                    if (selectedDirectSampling() !== 0)
                        syncDirectSamplingFields(true);
                    else
                        sanitizeScanFrequencyInputs();
                    configuredFreq0 =
                        parseFloat(document.getElementById("freqStart").value) *
                        1e6;
                    configuredFreq1 =
                        parseFloat(document.getElementById("freqEnd").value) *
                        1e6;
                    currentFreq0 = configuredFreq0;
                    currentFreq1 = configuredFreq1;
                }
                const result = await apiPost(
                    "/api/start",
                    buildScanRequest(options),
                    { timeoutMs: 15000 },
                );
                if (serial !== scanRequestSerial) return result;

                if (!result) {
                    clearAutoRestartTimer();
                    updateUI(false, false);
                    disconnectSSE();
                } else if (result.status === "ok") {
                    applyScanPlan(result);
                    updateUI(true, true);
                    clearScanDisplay();
                    connectSSE();
                } else {
                    if (!options.autoRetry) desiredScanRunning = false;
                    updateUI(false, true);
                    disconnectSSE();
                }
                return result;
            }

            let gainUpdateTimer = null;
            function scheduleGainUpdate() {
                if (gainUpdateTimer) clearTimeout(gainUpdateTimer);
                gainUpdateTimer = setTimeout(async function () {
                    gainUpdateTimer = null;
                    const result = await apiPost("/api/gain", {
                        gain_mode: document.getElementById("gainMode").value,
                        hardwaregain_db: parseFloat(
                            document.getElementById("vgaGain").value,
                        ),
                    });
                    if (result && result.status === "ok") {
                        syncPlutoControls(result);
                    }
                }, 80);
            }

            async function updateBackendRateLimit() {
                const result = await apiPost("/api/rate", {
                    rate_limit_lps: parseInt(
                        document.getElementById("rateLimit").value,
                    ),
                });

                if (!result) {
                    updateUI(false, false);
                    disconnectSSE();
                    return;
                }
                if (result.status === "ok") {
                    if (result.rate_limit_lps !== undefined)
                        setRateLimitValue(result.rate_limit_lps);
                    if (result.min_rate_lps !== undefined)
                        setMinRateValue(result.min_rate_lps);
                    syncPlutoControls(result);
                    updateFFTInfo(result);
                    updateUI(!!result.scanning, true);
                    if (result.scanning && !eventSource) connectSSE();
                } else {
                    updateUI(false, true);
                }
            }

            async function updateBackendMinRate() {
                const result = await apiPost("/api/min-rate", {
                    min_rate_lps: parseInt(
                        document.getElementById("minRate").value,
                    ),
                });

                if (!result) {
                    updateUI(false, false);
                    disconnectSSE();
                    return;
                }
                if (result.status === "ok") {
                    if (result.min_rate_lps !== undefined)
                        setMinRateValue(result.min_rate_lps);
                    syncPlutoControls(result);
                    updateFFTInfo(result);
                    updateUI(!!result.scanning, true);
                    if (result.scanning && !eventSource) connectSSE();
                } else {
                    updateUI(false, true);
                }
            }

            document
                .getElementById("btnStart")
                .addEventListener("click", async function () {
                    await startOrRestartScan();
                });

            document
                .getElementById("btnStop")
                .addEventListener("click", async function () {
                    desiredScanRunning = false;
                    clearAutoRestartTimer();
                    scanRequestSerial++;
                    viewRequestSerial++;
                    supersedeQueuedViewRequest();
                    pendingView = null;
                    pendingViewChange = false;
                    if (viewUpdateTimer) {
                        clearTimeout(viewUpdateTimer);
                        viewUpdateTimer = null;
                    }
                    const result = await apiPost("/api/stop", {});
                    if (!result) {
                        clearAutoRestartTimer();
                        updateUI(false, false);
                        disconnectSSE();
                    } else if (result.status === "ok") {
                        updateUI(false, true);
                        disconnectSSE();
                    }
                });

            document
                .getElementById("vgaGain")
                .addEventListener("input", function () {
                    document.getElementById("vgaVal").textContent = this.value;
                    scheduleGainUpdate();
                });
            document
                .getElementById("gainMode")
                .addEventListener("change", function () {
                    scheduleGainUpdate();
                });

            function handleRateSliderInput(changed) {
                const changes = syncRateRangeFromSliders(changed);
                rateMinDirty = rateMinDirty || changes.minChanged;
                rateMaxDirty = rateMaxDirty || changes.maxChanged;
            }

            async function handleRateSliderChange(changed) {
                const changes = syncRateRangeFromSliders(changed);
                const minChanged = changes.minChanged || rateMinDirty;
                const maxChanged = changes.maxChanged || rateMaxDirty;
                rateMinDirty = false;
                rateMaxDirty = false;
                if (minChanged) await updateBackendMinRate();
                if (maxChanged) await updateBackendRateLimit();
            }

            document
                .getElementById("rateMinSlider")
                .addEventListener("input", () => handleRateSliderInput("min"));
            document
                .getElementById("rateMaxSlider")
                .addEventListener("input", () => handleRateSliderInput("max"));
            document
                .getElementById("rateMinSlider")
                .addEventListener("change", () =>
                    handleRateSliderChange("min"),
                );
            document
                .getElementById("rateMaxSlider")
                .addEventListener("change", () =>
                    handleRateSliderChange("max"),
                );
            document
                .getElementById("directSampling")
                .addEventListener("change", handleDirectSamplingChanged);
            document
                .getElementById("samplerate")
                .addEventListener("change", handleSamplerateChanged);
            document
                .getElementById("rfBandwidth")
                .addEventListener("change", handleSamplerateChanged);

            /**
             * Enable or disable automatic waterfall level control.
             *
             * Auto mode is now the default startup behavior. Manual min/max
             * sliders remain available when explicitly disabled by the user.
             *
             * @param {boolean} enabled True to derive levels from incoming data.
             * @returns {void}
             */
            function setWaterfallAuto(enabled) {
                waterfallAuto = !!enabled;
                document.getElementById("wfAuto").checked = waterfallAuto;
                document.getElementById("wfMin").disabled = waterfallAuto;
                document.getElementById("wfMax").disabled = waterfallAuto;
                updateWaterfallLevelDisplay();
                if (!waterfallAuto) {
                    autoWfMin = null;
                    autoWfMax = null;
                }
                localStorage.setItem("wfAuto", waterfallAuto ? "1" : "0");
            }

            /**
             * Validate and persist manual waterfall level slider values.
             *
             * @param {"min"|"max"} changed Slider side most recently changed.
             * @returns {void}
             */
            function syncWaterfallBrightness(changed) {
                if (waterfallAuto) return;
                const minEl = document.getElementById("wfMin");
                const maxEl = document.getElementById("wfMax");
                let minVal = parseInt(minEl.value, 10);
                let maxVal = parseInt(maxEl.value, 10);

                if (minVal >= maxVal) {
                    if (changed === "min") minVal = Math.max(0, maxVal - 1);
                    else maxVal = Math.min(400, minVal + 1);
                }

                waterfallMin = minVal;
                waterfallMax = maxVal;
                minEl.value = minVal;
                maxEl.value = maxVal;
                updateWaterfallLevelDisplay();
                localStorage.setItem("wfMin", minVal);
                localStorage.setItem("wfMax", maxVal);
                scheduleCurrentViewRedraw();
            }

            document
                .getElementById("wfMin")
                .addEventListener("input", () =>
                    syncWaterfallBrightness("min"),
                );
            document
                .getElementById("wfMax")
                .addEventListener("input", () =>
                    syncWaterfallBrightness("max"),
                );
            document
                .getElementById("wfAuto")
                .addEventListener("change", function () {
                    setWaterfallAuto(this.checked);
                });

            // ===================================================================
            //  Init
            // ===================================================================
            window.__plutoTestHooks = {
                transitionState() {
                    return {
                        last_line: gotoLastLine ? { ...gotoLastLine } : null,
                        goto_active: gotoAnimationActive,
                        pending_view_change: pendingViewChange,
                    };
                },
                async stressViewRequests(windows) {
                    const before = await apiGet("/api/status");
                    if (before)
                        updateUI(!!before.scanning, true, !!before.reconnecting);
                    const requests = windows.map((window) => {
                        pendingViewChange = true;
                        return sendImmediateViewUpdate(
                            Number(window[0]),
                            Number(window[1]),
                            true,
                        );
                    });
                    const results = await Promise.all(requests);
                    const after = await apiGet("/api/status");
                    return {
                        before_view: Number(before && before.view_id),
                        after_view: Number(after && after.view_id),
                        applied_responses: results.filter(Boolean).length,
                        final_start: Number(after && after.visible_start_hz),
                        final_end: Number(after && after.visible_end_hz),
                        final_mode: after && after.mode,
                        scanning: !!(after && after.scanning),
                    };
                },
                async waterfallHistoryCheck() {
                    const data = new Uint8Array([
                        10, 20, 30, 40, 50, 60, 70, 80,
                    ]);
                    const map = (left, right, width, sourceLeft, sourceRight) => {
                        const axis = { left, right };
                        const values = [];
                        for (let x = 0; x < width; x++) {
                            values.push(
                                dataPeakForAxis(
                                    data,
                                    x,
                                    width,
                                    axis,
                                    sourceLeft,
                                    sourceRight,
                                ),
                            );
                        }
                        return values;
                    };
                    const checks = {
                        identity: map(100, 200, 8, 100, 200),
                        zoom_in: map(125, 175, 4, 100, 200),
                        zoom_out: map(50, 250, 8, 100, 200),
                        no_overlap: map(300, 400, 8, 100, 200),
                        reversed: map(100, 200, 8, 200, 100),
                    };

                    currentFreq0 = 100;
                    currentFreq1 = 200;
                    configuredFreq0 = 100;
                    configuredFreq1 = 200;
                    currentSteps = 1;
                    zoomLeft = 0;
                    zoomRight = 1;
                    wfRows = [{ data: new Uint8Array(data), f0: 100, f1: 200 }];
                    scheduleCurrentViewRedraw();
                    await waitForCurrentViewRedraw(3000);
                    const width = wfImageData.width;
                    const original = Array.from(
                        wfImageData.data.slice(0, width * 4),
                    );
                    let prevLeft = 100;
                    let prevRight = 200;
                    for (const next of [
                        [120, 180],
                        [130, 170],
                        [90, 210],
                        [100, 200],
                    ]) {
                        transformWaterfallPixels(
                            prevLeft,
                            prevRight,
                            next[0],
                            next[1],
                        );
                        prevLeft = next[0];
                        prevRight = next[1];
                    }
                    scheduleCurrentViewRedraw();
                    await waitForCurrentViewRedraw(3000);
                    const restored = Array.from(
                        wfImageData.data.slice(0, width * 4),
                    );
                    wfRows = [{ data: new Uint8Array(data) }];
                    scheduleCurrentViewRedraw();
                    await waitForCurrentViewRedraw(3000);
                    const invalidRow = Array.from(
                        wfImageData.data.slice(0, width * 4),
                    );
                    return {
                        checks,
                        canonical_round_trip: original.every(
                            (value, index) => value === restored[index],
                        ),
                        invalid_row_black: invalidRow.every(
                            (value, index) => index % 4 === 3 || value === 0,
                        ),
                    };
                },
            };

            (async function init() {
                const status = await apiGet("/api/status");
                if (status) {
                    syncDeviceInfo(status);
                    currentSteps = status.steps || 0;
                    updateFFTInfo(status);
                    configuredFreq0 =
                        status.configured_start_hz || status.freq_start || 0;
                    configuredFreq1 =
                        status.configured_end_hz || status.freq_end || 0;
                    currentFreq0 =
                        status.visible_start_hz || status.freq_start || 0;
                    currentFreq1 =
                        status.visible_end_hz || status.freq_end || 0;
                    if (status.samplerate !== undefined)
                        configuredSampleRate = Number(status.samplerate);
                    if (status.bw_ratio !== undefined)
                        configuredBwRatio = Number(status.bw_ratio);
                    syncPlutoControls(status);
                    if (status.direct_sampling !== undefined)
                        configuredDirectSampling = Number(
                            status.direct_sampling,
                        );
                    if (status.goto_freq_hz !== undefined)
                        gotoFreqHz = Number(status.goto_freq_hz);
                    if (status.goto_target_zoom !== undefined)
                        gotoTargetZoom = normalizeGotoTargetZoom(
                            status.goto_target_zoom,
                        );
                    if (status.goto_animate !== undefined)
                        gotoAnimate = !!Number(status.goto_animate);
                    if (status.goto_delay_s !== undefined)
                        gotoDelayS = normalizeGotoDelay(status.goto_delay_s);
                    const savedView =
                        loadHashViewForConfig(
                            configuredFreq0,
                            configuredFreq1,
                        ) ||
                        loadSavedViewForConfig(
                            configuredFreq0,
                            configuredFreq1,
                        );
                    if (savedView) {
                        currentFreq0 = savedView.left;
                        currentFreq1 = savedView.right;
                    }
                    if (status.view_id !== undefined)
                        currentViewId = Number(status.view_id);
                    if (hasFrequencyWindow() && currentSteps)
                        updateFrequencyLabels(
                            currentFreq0,
                            currentFreq1,
                            currentSteps,
                        );
                    if (hasFrequencyWindow())
                        document.getElementById("infoRange").textContent =
                            formatScanRange(currentFreq0, currentFreq1);
                    if (Number.isFinite(configuredFreq0))
                        document.getElementById("freqStart").value =
                            configuredFreq0 / 1e6;
                    if (Number.isFinite(configuredFreq1))
                        document.getElementById("freqEnd").value =
                            configuredFreq1 / 1e6;
                    if (status.converter_freq !== undefined) {
                        currentConverterFreq = status.converter_freq;
                        document.getElementById("converterFreq").value =
                            status.converter_freq / 1e6;
                    }
                    syncSampleRateOptions(
                        status.sample_rates,
                        status.active_samplerate || status.samplerate,
                    );
                    syncPlutoControls(status);
                    if (status.direct_sampling_max_hz !== undefined) {
                        currentDirectSamplingMaxHz = Number(
                            status.direct_sampling_max_hz,
                        );
                    } else {
                        refreshComputedDirectSamplingMax();
                    }
                    if (status.rate_limit_lps !== undefined) {
                        setRateLimitValue(status.rate_limit_lps);
                    }
                    if (status.min_rate_lps !== undefined) {
                        setMinRateValue(status.min_rate_lps);
                    }
                    if (status.direct_sampling !== undefined) {
                        configuredDirectSampling = Number(
                            status.direct_sampling,
                        );
                        document.getElementById("directSampling").value =
                            status.direct_sampling;
                        syncDirectSamplingFields(status.direct_sampling !== 0);
                    } else {
                        syncDirectSamplingFields(false);
                    }
                }

                /* Restore waterfall brightness from localStorage */
                const savedWfAuto = localStorage.getItem("wfAuto");
                const savedWfMin = localStorage.getItem("wfMin");
                const savedWfMax = localStorage.getItem("wfMax");
                if (savedWfMin !== null) {
                    document.getElementById("wfMin").value = savedWfMin;
                    waterfallMin = parseInt(savedWfMin, 10);
                }
                if (savedWfMax !== null) {
                    document.getElementById("wfMax").value = savedWfMax;
                    waterfallMax = parseInt(savedWfMax, 10);
                }
                syncWaterfallBrightness("max");
                updateRateRangeDisplay();
                setWaterfallAuto(savedWfAuto !== "0");

                if (!status) {
                    updateUI(false, false);
                } else if (status.scanning) {
                    updateUI(true, true);
                    clearScanDisplay();
                    scheduleViewUpdate(
                        currentFreq0,
                        currentFreq1,
                        !!loadSavedViewForConfig(
                            configuredFreq0,
                            configuredFreq1,
                        ),
                    );
                    connectSSE();
                } else {
                    updateUI(false, true);
                }
                loadBands();
                loadMarkers();
                window.setInterval(checkBackendStatus, 2000);
            })();
        </script>
    </body>
</html>
