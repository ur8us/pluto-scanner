                            scCanvas.height,
                        0,
                        scCanvas.height,
                    ),
                };
            }

            function frequencyAtWaterfallX(x) {
                if (!hasFrequencyWindow()) return null;
                const axis = getZoomedFrequencyAxis(
                    currentFreq0,
                    currentFreq1,
                    currentSteps,
                    currentBins ? currentBins.length : displayBins(),
                );
                if (axis.right <= axis.left || wfCanvas.width <= 0) return null;
                const frac = clampNumber(x / wfCanvas.width, 0, 1);
                return axis.left + frac * (axis.right - axis.left);
            }

            function rulerText() {
                if (!rulerStart || !rulerEnd) return "";
                const f0 = frequencyAtWaterfallX(rulerStart.x);
                const f1 = frequencyAtWaterfallX(rulerEnd.x);
                const secondsPerLine = estimateWaterfallSecondsPerLine();
                const seconds =
                    Math.abs(rulerEnd.y - rulerStart.y) * secondsPerLine;
                const frequencyText =
                    f0 === null || f1 === null
                        ? "--"
                        : formatFrequencyDistance(f1 - f0);
                return (
                    "Width: " +
                    frequencyText +
                    "\nHeight: " +
                    formatSecondsDistance(seconds)
                );
            }

            function frequencyAtScopeX(x) {
                if (!hasFrequencyWindow()) return null;
                const axis = getZoomedFrequencyAxis(
                    currentFreq0,
                    currentFreq1,
                    currentSteps,
                    currentBins ? currentBins.length : displayBins(),
                );
                if (axis.right <= axis.left || scCanvas.width <= 0) return null;
                const frac = clampNumber(x / scCanvas.width, 0, 1);
                return axis.left + frac * (axis.right - axis.left);
            }

            function packedLevelToDb(value) {
                return (
                    SPECTRUM_DB_FLOOR +
                    (Number(value) / 255) *
                        (SPECTRUM_DB_CEIL - SPECTRUM_DB_FLOOR)
                );
            }

            function scopeDbAtCanvasY(y) {
                const height = scCanvas.height;
                if (!Number.isFinite(y) || height <= 0) return null;
                const span = Math.max(1, waterfallMax - waterfallMin);
                const normalized = clampNumber(
                    (height - 5 - y) / Math.max(1, height - 10),
                    0,
                    1,
                );
                return packedLevelToDb(waterfallMin + normalized * span);
            }

            function scopeDbAboveBottomAtCanvasY(y) {
                const height = scCanvas.height;
                if (!Number.isFinite(y) || height <= 0) return null;
                const span = Math.max(1, waterfallMax - waterfallMin);
                const normalized = clampNumber(
                    (height - 5 - y) / Math.max(1, height - 10),
                    0,
                    1,
                );
                return (
                    (normalized * span * (SPECTRUM_DB_CEIL - SPECTRUM_DB_FLOOR)) /
                    255
                );
            }

            function spectrumRulerText() {
                if (!rulerStart || !rulerEnd) return "";
                const f0 = frequencyAtScopeX(rulerStart.x);
                const f1 = frequencyAtScopeX(rulerEnd.x);
                const level0 = scopeDbAtCanvasY(rulerStart.y);
                const level1 = scopeDbAtCanvasY(rulerEnd.y);
                const distanceText =
                    f0 === null || f1 === null
                        ? "--"
                        : formatFrequencyDistance(f1 - f0);
                if (level0 === null || level1 === null) {
                    return "Width: " + distanceText + "\nHeight: -- dB";
                }
                const delta = Math.abs(level1 - level0);
                const decimals = delta < 10 ? 2 : delta < 100 ? 1 : 0;
                return (
                    "Width: " +
                    distanceText +
                    "\nHeight: " +
                    formatCompactNumber(delta, decimals) +
                    " dB"
                );
            }

            function drawRulerOverlay() {
                clearRulerOverlay();
                if (!rulerActive || !rulerStart || !rulerEnd) return;

                rulerCtx.save();
                rulerCtx.lineWidth = 2;
                rulerCtx.setLineDash([8, 8]);
                rulerCtx.strokeStyle = "rgba(255, 255, 255, 0.95)";
                rulerCtx.beginPath();
                rulerCtx.moveTo(rulerStart.x, rulerStart.y);
                rulerCtx.lineTo(rulerEnd.x, rulerEnd.y);
                rulerCtx.stroke();
                rulerCtx.lineDashOffset = 8;
                rulerCtx.strokeStyle = "rgba(0, 0, 0, 0.95)";
                rulerCtx.beginPath();
                rulerCtx.moveTo(rulerStart.x, rulerStart.y);
                rulerCtx.lineTo(rulerEnd.x, rulerEnd.y);
                rulerCtx.stroke();
                rulerCtx.lineDashOffset = 0;

                rulerCtx.setLineDash([]);
                rulerCtx.fillStyle = "rgba(64, 160, 224, 0.9)";
                rulerCtx.strokeStyle = "rgba(5, 8, 12, 0.9)";
                for (const point of [rulerStart, rulerEnd]) {
                    rulerCtx.beginPath();
                    rulerCtx.arc(point.x, point.y, 3.5, 0, Math.PI * 2);
                    rulerCtx.fill();
                    rulerCtx.stroke();
                }
                rulerCtx.restore();
            }

            function drawScopeRulerOverlay() {
                clearScopeRulerOverlay();
                if (rulerCanvasKind !== "scope" || !rulerStart || !rulerEnd)
                    return;

                scopeRulerCtx.save();
                scopeRulerCtx.lineWidth = 2;
                scopeRulerCtx.setLineDash([8, 8]);
                scopeRulerCtx.strokeStyle = "rgba(255, 255, 255, 0.95)";
                scopeRulerCtx.beginPath();
                scopeRulerCtx.moveTo(rulerStart.x, rulerStart.y);
                scopeRulerCtx.lineTo(rulerEnd.x, rulerEnd.y);
                scopeRulerCtx.stroke();
                scopeRulerCtx.lineDashOffset = 8;
                scopeRulerCtx.strokeStyle = "rgba(0, 0, 0, 0.95)";
                scopeRulerCtx.beginPath();
                scopeRulerCtx.moveTo(rulerStart.x, rulerStart.y);
                scopeRulerCtx.lineTo(rulerEnd.x, rulerEnd.y);
                scopeRulerCtx.stroke();
                scopeRulerCtx.lineDashOffset = 0;

                scopeRulerCtx.setLineDash([]);
                scopeRulerCtx.fillStyle = "rgba(64, 160, 224, 0.9)";
                scopeRulerCtx.strokeStyle = "rgba(5, 8, 12, 0.9)";
                for (const point of [rulerStart, rulerEnd]) {
                    scopeRulerCtx.beginPath();
                    scopeRulerCtx.arc(point.x, point.y, 3.5, 0, Math.PI * 2);
                    scopeRulerCtx.fill();
                    scopeRulerCtx.stroke();
                }
                scopeRulerCtx.restore();
            }

            function showRulerReadout(evt) {
                hoverReadout.textContent = rulerText();
                hoverReadout.style.left = evt.clientX + 12 + "px";
                hoverReadout.style.top = evt.clientY + 12 + "px";
                hoverReadout.style.display = "block";
            }

            function showScopeRulerReadout(evt) {
                hoverReadout.textContent = spectrumRulerText();
                hoverReadout.style.left = evt.clientX + 12 + "px";
                hoverReadout.style.top = evt.clientY + 12 + "px";
                hoverReadout.style.display = "block";
            }

            function startRuler(evt) {
                if (evt.button !== 0 || !evt.ctrlKey) return;
                if (rulerCanvasKind) return;
                if (!hasFrequencyWindow()) return;
                const point = waterfallPointFromEvent(evt);
                if (!point) return;

                evt.preventDefault();
                evt.stopImmediatePropagation();
                hideHoverReadout();
                rulerActive = true;
                rulerCanvasKind = "waterfall";
                rulerStart = point;
                rulerEnd = point;
                updateRulerModeCursor();
                wfCanvas.setPointerCapture(evt.pointerId);
                drawRulerOverlay();
                showRulerReadout(evt);
            }

            function moveRuler(evt) {
                if (!rulerActive || rulerCanvasKind !== "waterfall") return;
                const point = waterfallPointFromEvent(evt);
                if (!point) return;
                evt.preventDefault();
                evt.stopImmediatePropagation();
                rulerEnd = point;
                drawRulerOverlay();
                showRulerReadout(evt);
            }

            function endRuler(evt) {
                if (!rulerActive || rulerCanvasKind !== "waterfall") return;
                evt.preventDefault();
                evt.stopImmediatePropagation();
                rulerActive = false;
                rulerCanvasKind = null;
                rulerStart = null;
                rulerEnd = null;
                updateRulerModeCursor();
                clearRulerOverlay();
                hideHoverReadout();
                try {
                    wfCanvas.releasePointerCapture(evt.pointerId);
                } catch (e) {
                    /* pointer capture may already be gone */
                }
            }

            function startScopeRuler(evt) {
                if (evt.button !== 0 || !evt.ctrlKey) return;
                if (rulerCanvasKind) return;
                if (!hasFrequencyWindow()) return;
                const point = scopePointFromEvent(evt);
                if (!point) return;

                evt.preventDefault();
                evt.stopImmediatePropagation();
                hideHoverReadout();
                rulerActive = true;
                rulerCanvasKind = "scope";
                rulerStart = point;
                rulerEnd = point;
                updateRulerModeCursor();
                scCanvas.setPointerCapture(evt.pointerId);
                drawScopeRulerOverlay();
                showScopeRulerReadout(evt);
            }

            function moveScopeRuler(evt) {
                if (!rulerActive || rulerCanvasKind !== "scope") return;
                const point = scopePointFromEvent(evt);
                if (!point) return;
                evt.preventDefault();
                evt.stopImmediatePropagation();
                rulerEnd = point;
                drawScopeRulerOverlay();
                showScopeRulerReadout(evt);
            }

            function endScopeRuler(evt) {
                if (!rulerActive || rulerCanvasKind !== "scope") return;
                evt.preventDefault();
                evt.stopImmediatePropagation();
                rulerActive = false;
                rulerCanvasKind = null;
                rulerStart = null;
                rulerEnd = null;
                updateRulerModeCursor();
                clearScopeRulerOverlay();
                hideHoverReadout();
                try {
                    scCanvas.releasePointerCapture(evt.pointerId);
                } catch (e) {
                    /* pointer capture may already be gone */
                }
            }

            wfCanvas.addEventListener("mousemove", (evt) =>
                showHoverReadout(wfCanvas, evt, false),
            );
            scCanvas.addEventListener("mousemove", (evt) =>
                showHoverReadout(scCanvas, evt, true),
            );
            wfCanvas.addEventListener("mouseleave", () => {
                if (!rulerActive) hideHoverReadout();
            });
            scCanvas.addEventListener("mouseleave", () => {
                if (!rulerActive) hideHoverReadout();
            });
            wfCanvas.addEventListener("pointerdown", startRuler);
            wfCanvas.addEventListener("pointermove", moveRuler);
            wfCanvas.addEventListener("pointerup", endRuler);
            wfCanvas.addEventListener("pointercancel", endRuler);
            wfCanvas.addEventListener("lostpointercapture", endRuler);
            scCanvas.addEventListener("pointerdown", startScopeRuler);
            scCanvas.addEventListener("pointermove", moveScopeRuler);
            scCanvas.addEventListener("pointerup", endScopeRuler);
            scCanvas.addEventListener("pointercancel", endScopeRuler);
            scCanvas.addEventListener("lostpointercapture", endScopeRuler);
            wfCanvas.addEventListener(
                "mousedown",
                (evt) => handleMarkerMouseDown(wfCanvas, evt),
                true,
            );
            scCanvas.addEventListener(
                "mousedown",
                (evt) => handleMarkerMouseDown(scCanvas, evt),
                true,
            );
            wfCanvas.addEventListener("contextmenu", (evt) =>
                handleMarkerContextMenu(wfCanvas, evt),
            );
            scCanvas.addEventListener("contextmenu", (evt) =>
                handleMarkerContextMenu(scCanvas, evt),
            );
            wfCanvas.addEventListener("auxclick", (evt) =>
                handleMarkerAuxClick(wfCanvas, evt),
            );
            scCanvas.addEventListener("auxclick", (evt) =>
                handleMarkerAuxClick(scCanvas, evt),
            );
            document
                .getElementById("markerOk")
                .addEventListener("click", applyMarkerDialog);
            document
                .getElementById("markerCancel")
                .addEventListener("click", closeMarkerDialog);
            document
                .getElementById("markerDelete")
                .addEventListener("click", deleteMarkerDialog);

            function applyZoomStepsAtCursor(canvas, clientX, signedSteps) {
                if (!canvas || !hasFrequencyWindow()) return;
                materializeGotoPreview();

                const rect = canvas.getBoundingClientRect();
                if (rect.width <= 0) return;
                if (!Number.isFinite(signedSteps) || signedSteps === 0) return;

                const cursor = Math.max(
                    0,
                    Math.min(1, (clientX - rect.left) / rect.width),
                );
                const full = primaryFrequencyWindow();
                const fullStart = full.left;
                const fullEnd = full.right;
                const fullSpan = fullEnd - fullStart;
                if (fullSpan <= 0) return;

                const currentSpan = currentFreq1 - currentFreq0;
                const anchor = currentFreq0 + cursor * currentSpan;
                const steps = Math.max(1, Math.min(8, Math.abs(signedSteps)));
                const factorPerStep = 1.18;
                const factor =
                    signedSteps < 0
                        ? Math.pow(1 / factorPerStep, steps)
                        : Math.pow(factorPerStep, steps);
                const minSpan = Math.max(1, fullSpan / MAX_ZOOM_FACTOR);
                let span = Math.max(
                    minSpan,
                    Math.min(fullSpan, currentSpan * factor),
                );
                let left = anchor - cursor * span;
                let right = left + span;

                if (left < fullStart) {
                    right += fullStart - left;
                    left = fullStart;
                }
                if (right > fullEnd) {
                    left -= right - fullEnd;
                    right = fullEnd;
                }
                left = Math.max(fullStart, left);
                right = Math.min(fullEnd, right);
                if (right <= left) return;

                const prevFreq0 = currentFreq0;
                const prevFreq1 = currentFreq1;
                gotoPreviewRetained = false;
                zoomLeft = 0;
                zoomRight = 1;
                currentFreq0 = left;
                currentFreq1 = right;
                pendingViewChange = true;
                binRangeCache = null;
                transformVisibleDisplay(
                    prevFreq0,
                    prevFreq1,
                    currentFreq0,
                    currentFreq1,
                );
                scheduleCurrentViewRedraw();
                updateFrequencyLabels(currentFreq0, currentFreq1, currentSteps);
                document.getElementById("infoRange").textContent =
                    formatScanRange(currentFreq0, currentFreq1);
                saveVisibleView();
                scheduleViewUpdate(left, right, true);
            }

            function wheelZoomStep(evt) {
                const delta = evt.deltaY;
                if (!Number.isFinite(delta) || delta === 0) return 0;

                let unit = 80;
                if (evt.deltaMode === WheelEvent.DOM_DELTA_LINE) unit = 3;
                else if (evt.deltaMode === WheelEvent.DOM_DELTA_PAGE) unit = 1;

                const steps = Math.max(
                    1,
                    Math.min(4, Math.round(Math.abs(delta) / unit)),
                );
                return (delta < 0 ? -1 : 1) * steps;
            }

            function applyVisibleWindow(
                left,
                right,
                force = false,
                immediateBackend = false,
            ) {
                if (!hasFrequencyWindow()) return;
                hideHoverReadout();
                const full = primaryFrequencyWindow();
                const clamped = clampVisibleWindow(
                    left,
                    right,
                    full.left,
                    full.right,
                );
                if (!clamped) return;
                if (
                    !force &&
                    Math.abs(clamped.left - currentFreq0) < 1 &&
                    Math.abs(clamped.right - currentFreq1) < 1
                ) {
                    return;
                }
                const prevFreq0 = currentFreq0;
                const prevFreq1 = currentFreq1;
                gotoPreviewRetained = false;
                zoomLeft = 0;
                zoomRight = 1;
                currentFreq0 = clamped.left;
                currentFreq1 = clamped.right;
                pendingViewChange = true;
                binRangeCache = null;
                transformVisibleDisplay(
                    prevFreq0,
                    prevFreq1,
                    currentFreq0,
                    currentFreq1,
                );
                scheduleCurrentViewRedraw();
                updateFrequencyLabels(currentFreq0, currentFreq1, currentSteps);
                document.getElementById("infoRange").textContent =
                    formatScanRange(currentFreq0, currentFreq1);
                saveVisibleView();
                scheduleViewUpdate(
                    currentFreq0,
                    currentFreq1,
                    true,
                    immediateBackend,
                );
            }

            function applyAnimatedGotoWindow(
                left,
                right,
                force = false,
                updateBackend = false,
            ) {
                if (!hasFrequencyWindow()) return false;
                hideHoverReadout();
                const full = primaryFrequencyWindow();
                const clamped = clampVisibleWindow(
                    left,
                    right,
                    full.left,
                    full.right,
                );
                if (!clamped) return false;
                if (
                    !force &&
                    Math.abs(clamped.left - currentFreq0) < 1 &&
                    Math.abs(clamped.right - currentFreq1) < 1
                ) {
                    return false;
                }
                const prevFreq0 = currentFreq0;
                const prevFreq1 = currentFreq1;
                gotoPreviewRetained = false;
                zoomLeft = 0;
                zoomRight = 1;
                currentFreq0 = clamped.left;
                currentFreq1 = clamped.right;
                pendingViewChange = true;
                binRangeCache = null;
                transformVisibleDisplay(
                    prevFreq0,
                    prevFreq1,
                    currentFreq0,
                    currentFreq1,
                );
                scheduleCurrentViewRedraw();
                updateFrequencyLabels(currentFreq0, currentFreq1, currentSteps);
                document.getElementById("infoRange").textContent =
                    formatScanRange(currentFreq0, currentFreq1);
                updateZoomIndicator();
                saveVisibleView();
                if (updateBackend)
                    scheduleViewUpdate(currentFreq0, currentFreq1, true, true);
                return true;
            }

            function zoomByFactor(factor, anchorFraction = 0.5) {
                if (!hasFrequencyWindow()) return;
                materializeGotoPreview();
                const full = primaryFrequencyWindow();
                const fullSpan = full.right - full.left;
                const currentSpan = currentFreq1 - currentFreq0;
                const minSpan = Math.max(1, fullSpan / MAX_ZOOM_FACTOR);
                const span = Math.max(
                    minSpan,
                    Math.min(fullSpan, currentSpan * factor),
                );
                const anchor = currentFreq0 + currentSpan * anchorFraction;
                applyVisibleWindow(
                    anchor - span * anchorFraction,
                    anchor + span * (1 - anchorFraction),
                );
            }

            function panByFraction(fraction) {
                if (!hasFrequencyWindow()) return;
                materializeGotoPreview();
                const span = currentFreq1 - currentFreq0;
                const delta = span * fraction;
                applyVisibleWindow(currentFreq0 + delta, currentFreq1 + delta);
            }

            function resetZoomView() {
                materializeGotoPreview();
                const full = primaryFrequencyWindow();
                applyVisibleWindow(full.left, full.right);
            }

            function flushZoomWheel() {
                const canvas = zoomWheelCanvas;
                const clientX = zoomWheelClientX;
                const signedSteps =
                    zoomWheelDirection *
                    Math.max(1, Math.min(8, zoomWheelSteps));
                zoomWheelFrame = 0;
                zoomWheelSteps = 0;
                zoomWheelDirection = 0;
                zoomWheelCanvas = null;
                if (signedSteps !== 0)
                    applyZoomStepsAtCursor(canvas, clientX, signedSteps);
            }

            function handleZoomWheel(evt) {
                if (!evt.shiftKey || !hasFrequencyWindow()) {
                    return;
                }

                evt.preventDefault();
                const signedStep = wheelZoomStep(evt);
                if (signedStep === 0) return;
                const direction = signedStep < 0 ? -1 : 1;
                if (
                    zoomWheelFrame &&
                    zoomWheelDirection &&
                    direction !== zoomWheelDirection
                )
                    return;
                zoomWheelDirection = direction;
                zoomWheelSteps = Math.min(
                    8,
                    zoomWheelSteps + Math.abs(signedStep),
                );
                zoomWheelCanvas = evt.currentTarget;
                zoomWheelClientX = evt.clientX;
                if (!zoomWheelFrame)
                    zoomWheelFrame = requestAnimationFrame(flushZoomWheel);
            }

            function setPanningCursor(active) {
                document.body.classList.toggle("panning-mode", active);
            }

            function clampPanWindow(left, right) {
                const full = primaryFrequencyWindow();
                const fullStart = full.left;
                const fullEnd = full.right;
                const fullSpan = fullEnd - fullStart;
                const span = right - left;

                if (fullSpan <= 0 || span >= fullSpan) {
                    return { left: fullStart, right: fullEnd };
                }
                if (left < fullStart) {
                    right += fullStart - left;
                    left = fullStart;
                }
                if (right > fullEnd) {
                    left -= right - fullEnd;
                    right = fullEnd;
                }
                return {
                    left: Math.max(fullStart, left),
                    right: Math.min(fullEnd, right),
                };
            }

            function startPan(evt) {
                if (evt.button !== 0 || evt.shiftKey || evt.ctrlKey) return;
                if (!hasFrequencyWindow()) return;
                hideHoverReadout();

                const full = primaryFrequencyWindow();
                const fullStart = full.left;
                const fullEnd = full.right;
                if (currentFreq1 - currentFreq0 >= fullEnd - fullStart) return;

                cancelCurrentViewRedraw();
                capturePanPreviewBase();
                panActive = true;
                panStartX = evt.clientX;
                panStartFreq0 = currentFreq0;
                panStartFreq1 = currentFreq1;
                setPanningCursor(true);
                wfCanvas.setPointerCapture(evt.pointerId);
                evt.preventDefault();
            }

            function movePan(evt) {
                if (!panActive) return;
                const rect = wfCanvas.getBoundingClientRect();
                const width = rect.width;
                if (width <= 0) return;

                const span = panStartFreq1 - panStartFreq0;
                const dx = evt.clientX - panStartX;
                const deltaFreq = -(dx / width) * span;
                const clamped = clampPanWindow(
                    panStartFreq0 + deltaFreq,
                    panStartFreq1 + deltaFreq,
                );

                if (
                    Math.abs(clamped.left - currentFreq0) < 1 &&
                    Math.abs(clamped.right - currentFreq1) < 1
                ) {
                    return;
                }

                const prevFreq0 = currentFreq0;
                const prevFreq1 = currentFreq1;
                currentFreq0 = clamped.left;
                currentFreq1 = clamped.right;
                pendingViewChange = true;
                binRangeCache = null;
                if (
                    panPreviewBaseData &&
                    wfImageData &&
                    panPreviewBaseWidth === wfImageData.width &&
                    panPreviewBaseHeight === wfImageData.height
                ) {
                    transformVisibleDisplay(
                        panStartFreq0,
                        panStartFreq1,
                        currentFreq0,
                        currentFreq1,
                        panPreviewBaseData,
                    );
                } else {
                    transformVisibleDisplay(
                        prevFreq0,
                        prevFreq1,
                        currentFreq0,
                        currentFreq1,
                    );
                }
                scheduleCurrentViewRedraw();
                updateFrequencyLabels(currentFreq0, currentFreq1, currentSteps);
                document.getElementById("infoRange").textContent =
                    formatScanRange(currentFreq0, currentFreq1);
                saveVisibleView();
                scheduleViewUpdate(currentFreq0, currentFreq1, true);
                evt.preventDefault();
            }

            function endPan(evt) {
                if (!panActive) return;
                panActive = false;
                clearPanPreviewBase();
                setPanningCursor(false);
                try {
                    wfCanvas.releasePointerCapture(evt.pointerId);
                } catch (e) {
                    /* pointer capture may already be gone */
                }
                scheduleCurrentViewRedraw();
            }

            function setZoomCursor(active) {
                document.body.classList.toggle("zoom-mode", active);
            }

            function setRulerReadyCursor(active) {
                document.body.classList.toggle("ruler-ready", active);
            }

            function isEditingElement(target) {
                if (!target) return false;
                const tag = target.tagName;
                return (
                    tag === "INPUT" || tag === "SELECT" || tag === "TEXTAREA"
                );
            }

            function shouldCancelGotoAnimationForKey(evt) {
                if (!evt || !evt.key) return false;
                if (evt.key === "Escape") return true;
                if (evt.key.length === 1) return true;
                return false;
            }

            window.addEventListener("keydown", (evt) => {
                const markerDialog = document.getElementById("markerDialog");
                const gotoDialog = document.getElementById("gotoDialog");
                const markerOpen =
                    markerDialog && markerDialog.classList.contains("open");
                const gotoOpen =
                    gotoDialog && gotoDialog.classList.contains("open");
                if (
                    gotoAnimationActive &&
                    shouldCancelGotoAnimationForKey(evt)
                )
                    cancelGotoAnimation();
                if (
                    evt.key === "Escape" &&
                    gotoOpen
                ) {
                    evt.preventDefault();
                    closeGotoDialog();
                    return;
                }
                if (evt.key === "Escape" && markerOpen) {
                    evt.preventDefault();
                    closeMarkerDialog();
                    return;
                }
                if (evt.key === "Enter" && gotoOpen) {
                    evt.preventDefault();
                    applyGotoDialog();
                    return;
                }
                if (
                    evt.key === "Enter" &&
                    markerOpen &&
                    evt.target &&
                    evt.target.id !== "markerDelete" &&
                    evt.target.id !== "markerCancel"
                ) {
                    evt.preventDefault();
                    applyMarkerDialog();
                    return;
                }
                if (evt.key === "Shift") setZoomCursor(true);
                if (evt.key === "Control") setRulerReadyCursor(true);
                if (isEditingElement(evt.target)) return;
                if (
                    (evt.key === "+" || evt.key === "=") &&
                    !evt.ctrlKey &&
                    !evt.metaKey
                ) {
                    evt.preventDefault();
                    zoomByFactor(1 / 1.35);
                } else if (
                    (evt.key === "-" || evt.key === "_") &&
                    !evt.ctrlKey &&
                    !evt.metaKey
                ) {
                    evt.preventDefault();
                    zoomByFactor(1.35);
                } else if (evt.key === "ArrowLeft") {
                    evt.preventDefault();
                    panByFraction(-0.2);
                } else if (evt.key === "ArrowRight") {
                    evt.preventDefault();
                    panByFraction(0.2);
                } else if (evt.key === "0" && !evt.ctrlKey && !evt.metaKey) {
                    evt.preventDefault();
