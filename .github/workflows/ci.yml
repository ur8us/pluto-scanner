name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: ci-linux
    runs-on: ubuntu-24.04

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libiio-dev \
            nodejs \
            perl \
            pkg-config \
            python3

      - name: Show build configuration
        run: make build-info

      - name: Build
        run: make

      - name: Run validation checks
        run: make check

  macos:
    name: ci-macos
    runs-on: macos-15
    env:
      DEPS_PREFIX: ${{ github.workspace }}/.ci/deps
      BUILD_ROOT: ${{ github.workspace }}/.ci/build-macos
      PKG_CONFIG_PATH: ${{ github.workspace }}/.ci/deps/lib/pkgconfig:${{ github.workspace }}/.ci/deps/lib64/pkgconfig

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          brew untap aws/tap || true
          brew install cmake ninja node pkg-config

      - name: Build static libxml2 and libiio
        run: tools/ci/build-static-deps.sh

      - name: Show build configuration
        run: |
          iio_cflags="$(pkg-config --cflags libiio libxml-2.0)"
          iio_libs="$(pkg-config --libs --static libiio libxml-2.0)"
          make build-info IIO_CFLAGS="$iio_cflags" IIO_LIBS="$iio_libs"

      - name: Build
        run: |
          iio_cflags="$(pkg-config --cflags libiio libxml-2.0)"
          iio_libs="$(pkg-config --libs --static libiio libxml-2.0)"
          make IIO_CFLAGS="$iio_cflags" IIO_LIBS="$iio_libs"

      - name: Run validation checks
        run: |
          iio_cflags="$(pkg-config --cflags libiio libxml-2.0)"
          iio_libs="$(pkg-config --libs --static libiio libxml-2.0)"
          make check IIO_CFLAGS="$iio_cflags" IIO_LIBS="$iio_libs"

  windows:
    name: ci-windows
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            base-devel
            git
            make
            perl
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-libiio
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-python
            mingw-w64-ucrt-x86_64-nodejs

      - name: Show build configuration
        run: make build-info

      - name: Build
        run: make

      - name: Run validation checks
        run: make check
